<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel DGC — Validación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f1117; --surface:#181c27; --card:#1e2235; --border:#2a2f45;
  --accent:#4f7cff; --accent2:#00d4aa; --warn:#ff6b6b; --orange:#f59e0b;
  --text:#e8eaf0; --muted:#7b82a0;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600}.logo-title span{color:var(--accent)}
.logo small{display:block;font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(79,124,255,.13);color:var(--accent)}
.nav-item.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* MAIN */
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;background:var(--bg);position:sticky;top:0;z-index:50}
.page-title{font-size:15px;font-weight:600;flex:1}
#content{padding:24px 28px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3a6aff}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,107,107,.12);color:var(--warn);border:1px solid rgba(255,107,107,.25)}.btn-danger:hover{background:rgba(255,107,107,.2)}
.btn-success{background:rgba(0,212,170,.12);color:var(--accent2);border:1px solid rgba(0,212,170,.25)}
.btn-sm{padding:4px 10px;font-size:12px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:380px}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:28px}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13.5px;font-family:var(--font);outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:8px}

/* TABLE */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-header h3{font-size:14px;font-weight:600;flex:1}
.search-input{padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:220px}
.search-input:focus{border-color:var(--accent)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface);padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:500}
tbody tr{border-top:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 14px;vertical-align:middle}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-activo,.b-entregado{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-inactivo,.b-cancelado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-pendiente{background:rgba(79,124,255,.12);color:var(--accent)}
.b-en_ruta,.b-bloqueado{background:rgba(245,158,11,.12);color:var(--orange)}
.b-no_entregado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-mayorista{background:rgba(79,124,255,.12);color:var(--accent)}
.b-minorista{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-especial{background:rgba(245,158,11,.12);color:var(--orange)}

/* STATS */
.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.stat-value{font-size:26px;font-weight:600;margin:4px 0 2px;font-family:var(--mono)}
.stat-sub{font-size:11.5px;color:var(--muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:500px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
.detail-item span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}

/* MISC */
.mono{font-family:var(--mono);font-size:12px}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:13.5px}
.empty-icon{font-size:32px;margin-bottom:10px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.4);color:var(--accent2)}
#toast.err{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:var(--warn)}
.loading-page{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>Sistema DGC</h2>
    <p>Panel de validación — conecta con tu API en Render</p>
    <div class="field">
      <label>URL de la API</label>
      <input id="inp-api" value="https://gestion-dgc-api.onrender.com" style="font-family:var(--mono);font-size:12px"/>
    </div>
    <div class="field"><label>Email</label><input id="inp-email" type="email" value="admin@sistema.com"/></div>
    <div class="field"><label>Contraseña</label><input id="inp-pass" type="password" placeholder="••••••••"/></div>
    <div id="login-err" style="color:var(--warn);font-size:12px;min-height:18px;margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar al sistema</button>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-title">Sistema <span>DGC</span></div>
    <small>Panel de validación</small>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" data-page="dashboard" onclick="goTo(this)"><span class="nav-icon">◼</span>Dashboard</div>
    <div class="nav-section">Operaciones</div>
    <div class="nav-item" data-page="clientes" onclick="goTo(this)"><span class="nav-icon">👤</span>Clientes</div>
    <div class="nav-item" data-page="productos" onclick="goTo(this)"><span class="nav-icon">📦</span>Productos</div>
    <div class="nav-item" data-page="precios" onclick="goTo(this)"><span class="nav-icon">🏷️</span>Listas de precios</div>
    <div class="nav-item" data-page="pedidos" onclick="goTo(this)"><span class="nav-icon">📋</span>Pedidos</div>
    <div class="nav-section">Próximamente</div>
    <div class="nav-item disabled"><span class="nav-icon">🚚</span>Rutas</div>
    <div class="nav-item disabled"><span class="nav-icon">📄</span>Remitos</div>
    <div class="nav-item disabled"><span class="nav-icon">💰</span>Cobranzas</div>
    <div class="nav-item disabled"><span class="nav-icon">🏦</span>Cheques</div>
    <div class="nav-item disabled"><span class="nav-icon">🏭</span>Proveedores</div>
    <div class="nav-item disabled"><span class="nav-icon">💸</span>Gastos</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar" id="user-av">A</div>
      <div>
        <div style="font-size:12.5px;font-weight:500" id="user-name">—</div>
        <div style="font-size:11px;color:var(--muted)" id="user-role">—</div>
      </div>
    </div>
    <div class="nav-item" onclick="doLogout()" style="margin-top:4px"><span class="nav-icon">↩</span>Cerrar sesión</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div id="topbar-actions"></div>
  </div>
  <div id="content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<div id="toast"></div>

<script>
// ── ESTADO GLOBAL ────────────────────────────────────────────
let API = 'https://gestion-dgc-api.onrender.com';
let TOKEN = null;

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin() {
  API = document.getElementById('inp-api').value.replace(/\/+$/,'');
  const email = document.getElementById('inp-email').value;
  const pass  = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = 'Conectando…';
  try {
    const r = await fetch(`${API}/api/v1/usuarios/login`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    if(!r.ok){ errEl.textContent='Email o contraseña incorrectos'; return; }
    const d = await r.json();
    TOKEN = d.access_token;
    document.getElementById('user-name').textContent = d.usuario.nombre;
    document.getElementById('user-role').textContent  = d.usuario.rol;
    document.getElementById('user-av').textContent    = d.usuario.nombre[0].toUpperCase();
    document.getElementById('login-screen').style.display = 'none';
    goTo(document.querySelector('.nav-item[data-page="dashboard"]'));
  } catch(e) {
    errEl.textContent = 'No se pudo conectar. Verificá la URL de la API.';
  }
}
document.getElementById('inp-pass').addEventListener('keydown', e => e.key==='Enter' && doLogin());

function doLogout(){
  TOKEN = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pass').value = '';
}

// ── FETCH HELPER ─────────────────────────────────────────────
async function api(path, opts={}){
  const r = await fetch(`${API}${path}`,{
    ...opts,
    headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})}
  });
  if(!r.ok){
    const err = await r.json().catch(()=>({detail:'Error desconocido'}));
    throw new Error(Array.isArray(err.detail)? err.detail.map(e=>e.msg).join(', ') : (err.detail||r.statusText));
  }
  if(r.status===204) return null;
  return r.json();
}

// ── ROUTER ───────────────────────────────────────────────────
const PAGE_TITLES = {dashboard:'Dashboard',clientes:'Clientes',productos:'Productos',precios:'Listas de precios',pedidos:'Pedidos'};
const PAGE_FNS    = {dashboard:pgDashboard, clientes:pgClientes, productos:pgProductos, precios:pgPrecios, pedidos:pgPedidos};

function goTo(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const page = el.dataset.page;
  document.getElementById('page-title').textContent = PAGE_TITLES[page]||page;
  document.getElementById('topbar-actions').innerHTML = '';
  setContent('<div class="loading-page"><div class="spinner"></div> Cargando…</div>');
  (PAGE_FNS[page]||pgComingSoon)();
}

function setContent(html){ document.getElementById('content').innerHTML = html; }

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.className='', 3200);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(html){
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(){ document.getElementById('modal-overlay').style.display = 'none'; }

// ── BADGE ────────────────────────────────────────────────────
function badge(val){ return `<span class="badge b-${val}">${val.replace(/_/g,' ')}</span>`; }

// ── FILTRO TABLA ─────────────────────────────────────────────
function filtrar(q, tbodyId){
  document.querySelectorAll(`#${tbodyId} tr`).forEach(r=>{
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ══════════════════════════════════════════════════════════════
//  PÁGINAS
// ══════════════════════════════════════════════════════════════

// ── DASHBOARD ────────────────────────────────────────────────
async function pgDashboard(){
  try {
    const [clientes, productos, pedidos] = await Promise.all([
      api('/api/v1/clientes/'), api('/api/v1/productos/'), api('/api/v1/pedidos/')
    ]);
    const activos    = clientes.filter(c=>c.estado==='activo').length;
    const pendientes = pedidos.filter(p=>p.estado==='pendiente').length;
    const entregados = pedidos.filter(p=>p.estado==='entregado').length;
    const facturado  = pedidos.filter(p=>p.estado==='entregado').reduce((s,p)=>s+parseFloat(p.total||0),0);

    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Clientes activos</div><div class="stat-value" style="color:var(--accent)">${activos}</div><div class="stat-sub">${clientes.length} total</div></div>
        <div class="stat-card"><div class="stat-label">Productos</div><div class="stat-value">${productos.length}</div><div class="stat-sub">en catálogo</div></div>
        <div class="stat-card"><div class="stat-label">Pedidos pendientes</div><div class="stat-value" style="color:var(--orange)">${pendientes}</div><div class="stat-sub">${entregados} entregados</div></div>
        <div class="stat-card"><div class="stat-label">Total facturado</div><div class="stat-value" style="color:var(--accent2)">$${facturado.toLocaleString('es-AR',{minimumFractionDigits:0})}</div><div class="stat-sub">pedidos entregados</div></div>
      </div>
      <div class="section-header"><h3>Últimos pedidos</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
          <tbody>
            ${pedidos.slice(0,10).map(p=>`
              <tr>
                <td class="mono">${p.id.slice(0,8)}…</td>
                <td>${p.fecha_pedido}</td>
                <td class="mono">$${parseFloat(p.total).toLocaleString('es-AR')}</td>
                <td>${badge(p.estado)}</td>
              </tr>`).join('') || '<tr><td colspan="4" class="empty">Sin pedidos aún</td></tr>'}
          </tbody>
        </table>
      </div>`);
  } catch(e){ setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`); }
}

// ── CLIENTES ─────────────────────────────────────────────────
async function pgClientes(){
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="modalNuevoCliente()">+ Nuevo cliente</button>`;
  try {
    const rows = await api('/api/v1/clientes/');
    setContent(`
      <div class="section-header">
        <h3>${rows.length} clientes</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-clientes')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Razón social</th><th>CUIT</th><th>Teléfono</th><th>Localidad</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-clientes">
          ${rows.map(c=>`
            <tr>
              <td><strong>${c.razon_social}</strong></td>
              <td class="mono">${c.cuit||'—'}</td>
              <td class="mono">${c.telefono||'—'}</td>
              <td>${c.localidad||'—'}</td>
              <td>${badge(c.estado)}</td>
              <td><button class="btn btn-ghost btn-sm" onclick="verCliente('${c.id}')">Ver</button></td>
            </tr>`).join('')||'<tr><td colspan="6" class="empty">Sin clientes</td></tr>'}
        </tbody>
      </table></div>`);
  } catch(e){ setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`); }
}

async function modalNuevoCliente(){
  let listas=[];
  try{ listas = await api('/api/v1/precios/'); }catch(e){}
  openModal(`
    <h3>Nuevo cliente</h3>
    <div class="form-row">
      <div class="field"><label>Razón social *</label><input id="f-rs" placeholder="Empresa S.A."/></div>
      <div class="field"><label>CUIT</label><input id="f-cuit" placeholder="20-12345678-9"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Teléfono</label><input id="f-tel" placeholder="351 000 0000"/></div>
      <div class="field"><label>Email</label><input id="f-email" type="email"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Dirección</label><input id="f-dir"/></div>
      <div class="field"><label>Localidad</label><input id="f-loc" placeholder="Córdoba"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Condición IVA</label>
        <select id="f-iva">
          <option value="consumidor_final">Consumidor final</option>
          <option value="responsable_inscripto">Responsable inscripto</option>
          <option value="monotributo">Monotributo</option>
          <option value="exento">Exento</option>
        </select>
      </div>
      <div class="field"><label>Lista de precios</label>
        <select id="f-lista">
          <option value="">Sin lista</option>
          ${listas.map(l=>`<option value="${l.id}">${l.nombre} (${l.tipo})</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearCliente()">Crear cliente</button>
    </div>`);
}

async function crearCliente(){
  const b = {
    razon_social:    document.getElementById('f-rs').value,
    cuit:            document.getElementById('f-cuit').value||null,
    telefono:        document.getElementById('f-tel').value||null,
    email:           document.getElementById('f-email').value||null,
    direccion:       document.getElementById('f-dir').value||null,
    localidad:       document.getElementById('f-loc').value||null,
    condicion_iva:   document.getElementById('f-iva').value,
    lista_precios_id:document.getElementById('f-lista').value||null,
  };
  if(!b.razon_social){ toast('La razón social es obligatoria','err'); return; }
  try{
    await api('/api/v1/clientes/',{method:'POST',body:JSON.stringify(b)});
    toast('Cliente creado'); closeModal(); pgClientes();
  }catch(e){ toast(e.message,'err'); }
}

async function verCliente(id){
  try{
    const c = await api(`/api/v1/clientes/${id}`);
    openModal(`
      <h3>${c.razon_social}</h3>
      <div class="detail-grid">
        <div class="detail-item"><span>CUIT</span>${c.cuit||'—'}</div>
        <div class="detail-item"><span>Condición IVA</span>${c.condicion_iva}</div>
        <div class="detail-item"><span>Teléfono</span>${c.telefono||'—'}</div>
        <div class="detail-item"><span>Email</span>${c.email||'—'}</div>
        <div class="detail-item"><span>Dirección</span>${c.direccion||'—'}</div>
        <div class="detail-item"><span>Localidad</span>${c.localidad||'—'}</div>
        <div class="detail-item"><span>Estado</span>${badge(c.estado)}</div>
        <div class="detail-item"><span>Alta</span>${c.created_at?.slice(0,10)||'—'}</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        <button class="btn btn-danger btn-sm" onclick="cambiarEstadoCliente('${c.id}','${c.estado==='activo'?'inactivo':'activo'}')">
          ${c.estado==='activo'?'Desactivar':'Activar'}
        </button>
      </div>`);
  }catch(e){ toast(e.message,'err'); }
}

async function cambiarEstadoCliente(id, estado){
  try{
    await api(`/api/v1/clientes/${id}`,{method:'PATCH',body:JSON.stringify({estado})});
    toast(`Cliente ${estado}`); closeModal(); pgClientes();
  }catch(e){ toast(e.message,'err'); }
}

// ── PRODUCTOS ────────────────────────────────────────────────
async function pgProductos(){
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="modalNuevoProducto()">+ Nuevo producto</button>`;
  try{
    const rows = await api('/api/v1/productos/?solo_activos=false');
    setContent(`
      <div class="section-header">
        <h3>${rows.length} productos</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-prod')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Nombre</th><th>Descripción</th><th>Unidad</th><th>Estado</th></tr></thead>
        <tbody id="tb-prod">
          ${rows.map(p=>`
            <tr>
              <td><strong>${p.nombre}</strong></td>
              <td class="muted">${p.descripcion||'—'}</td>
              <td class="mono">${p.unidad_medida}</td>
              <td>${badge(p.activo?'activo':'inactivo')}</td>
            </tr>`).join('')||'<tr><td colspan="4" class="empty">Sin productos</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){ setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`); }
}

async function modalNuevoProducto(){
  openModal(`
    <h3>Nuevo producto</h3>
    <div class="field"><label>Nombre *</label><input id="fp-nombre" placeholder="Ej: Bidón 20L"/></div>
    <div class="field"><label>Descripción</label><textarea id="fp-desc" rows="2"></textarea></div>
    <div class="field"><label>Unidad de medida</label>
      <select id="fp-unidad">
        <option value="unidad">Unidad</option>
        <option value="kg">Kg</option>
        <option value="litro">Litro</option>
        <option value="docena">Docena</option>
        <option value="caja">Caja</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearProducto()">Crear</button>
    </div>`);
}

async function crearProducto(){
  const b = {
    nombre: document.getElementById('fp-nombre').value,
    descripcion: document.getElementById('fp-desc').value||null,
    unidad_medida: document.getElementById('fp-unidad').value,
  };
  if(!b.nombre){ toast('El nombre es obligatorio','err'); return; }
  try{
    await api('/api/v1/productos/',{method:'POST',body:JSON.stringify(b)});
    toast('Producto creado'); closeModal(); pgProductos();
  }catch(e){ toast(e.message,'err'); }
}

// ── PRECIOS ──────────────────────────────────────────────────
async function pgPrecios(){
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="modalNuevaLista()">+ Nueva lista</button>`;
  try{
    const listas = await api('/api/v1/precios/');
    setContent(`
      <div class="section-header"><h3>${listas.length} listas de precios</h3></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
        ${listas.map(l=>`
          <div class="stat-card" style="cursor:pointer" onclick="verLista('${l.id}','${l.nombre}')">
            <div class="stat-label">${l.tipo}</div>
            <div style="font-size:16px;font-weight:600;margin:6px 0">${l.nombre}</div>
            ${badge(l.activo?'activo':'inactivo')}
            <div style="margin-top:12px;font-size:12px;color:var(--accent)">Editar precios →</div>
          </div>`).join('')||'<div class="empty">Sin listas</div>'}
      </div>`);
  }catch(e){ setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`); }
}

async function verLista(id, nombre){
  try{
    const [lista, productos] = await Promise.all([api(`/api/v1/precios/${id}`), api('/api/v1/productos/')]);
    const pm = {};
    lista.items.forEach(i=>pm[i.producto_id]=i.precio);
    openModal(`
      <h3>${nombre}</h3>
      <p class="muted" style="font-size:12px;margin-bottom:14px">Editá los precios directamente — se guardan al cambiar el campo</p>
      <div class="table-wrap" style="max-height:340px;overflow-y:auto"><table>
        <thead><tr><th>Producto</th><th>Unidad</th><th>Precio $</th></tr></thead>
        <tbody>
          ${productos.map(p=>`
            <tr>
              <td><strong>${p.nombre}</strong></td>
              <td class="mono muted">${p.unidad_medida}</td>
              <td><input type="number" step="0.01" min="0" value="${pm[p.id]||''}" placeholder="—"
                style="width:110px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none"
                onchange="setPrecio('${id}','${p.id}',this.value)"
                onfocus="this.style.borderColor='var(--accent)'"
                onblur="this.style.borderColor='var(--border)'"/></td>
            </tr>`).join('')}
        </tbody>
      </table></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
  }catch(e){ toast(e.message,'err'); }
}

async function setPrecio(listaId, productoId, precio){
  if(!precio) return;
  try{
    await api(`/api/v1/precios/${listaId}/items`,{method:'PUT',body:JSON.stringify({producto_id:productoId,precio:parseFloat(precio)})});
    toast('Precio guardado');
  }catch(e){ toast(e.message,'err'); }
}

async function modalNuevaLista(){
  openModal(`
    <h3>Nueva lista de precios</h3>
    <div class="field"><label>Nombre *</label><input id="fl-nombre" placeholder="Ej: Mayorista Córdoba"/></div>
    <div class="field"><label>Tipo</label>
      <select id="fl-tipo">
        <option value="minorista">Minorista</option>
        <option value="mayorista">Mayorista</option>
        <option value="especial">Especial</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearLista()">Crear</button>
    </div>`);
}

async function crearLista(){
  const b={nombre:document.getElementById('fl-nombre').value, tipo:document.getElementById('fl-tipo').value};
  if(!b.nombre){ toast('El nombre es obligatorio','err'); return; }
  try{
    await api('/api/v1/precios/',{method:'POST',body:JSON.stringify(b)});
    toast('Lista creada'); closeModal(); pgPrecios();
  }catch(e){ toast(e.message,'err'); }
}

// ── PEDIDOS ──────────────────────────────────────────────────
async function pgPedidos(){
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="modalNuevoPedido()">+ Nuevo pedido</button>`;
  try{
    const pedidos = await api('/api/v1/pedidos/');
    const estados = ['pendiente','en_ruta','entregado','cancelado','no_entregado'];
    const total   = pedidos.reduce((s,p)=>s+parseFloat(p.total||0),0);
    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
        ${estados.map(e=>`
          <div class="stat-card">
            <div class="stat-label">${e.replace('_',' ')}</div>
            <div class="stat-value" style="font-size:22px">${pedidos.filter(p=>p.estado===e).length}</div>
          </div>`).join('')}
      </div>
      <div class="section-header">
        <h3>${pedidos.length} pedidos · $${total.toLocaleString('es-AR',{minimumFractionDigits:0})} total</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-ped')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Fecha pedido</th><th>Entrega</th><th>Items</th><th>Total</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-ped">
          ${pedidos.map(p=>`
            <tr>
              <td class="mono">${p.id.slice(0,8)}…</td>
              <td>${p.fecha_pedido}</td>
              <td>${p.fecha_entrega||'—'}</td>
              <td class="muted" style="font-size:12px">${p.items?.length??'—'} items</td>
              <td class="mono">$${parseFloat(p.total).toLocaleString('es-AR')}</td>
              <td>${badge(p.estado)}</td>
              <td><button class="btn btn-ghost btn-sm" onclick="verPedido('${p.id}')">Ver</button></td>
            </tr>`).join('')||'<tr><td colspan="7" class="empty">Sin pedidos</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){ setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${e.message}</div>`); }
}

async function verPedido(id){
  try{
    const p = await api(`/api/v1/pedidos/${id}`);
    openModal(`
      <h3>Pedido <span class="mono muted" style="font-size:12px">${p.id.slice(0,8)}…</span></h3>
      <div class="detail-grid" style="margin-bottom:16px">
        <div class="detail-item"><span>Estado</span>${badge(p.estado)}</div>
        <div class="detail-item"><span>Total</span><strong class="mono">$${parseFloat(p.total).toLocaleString('es-AR')}</strong></div>
        <div class="detail-item"><span>Fecha pedido</span>${p.fecha_pedido}</div>
        <div class="detail-item"><span>Fecha entrega</span>${p.fecha_entrega||'—'}</div>
        ${p.observaciones?`<div class="detail-item" style="grid-column:1/-1"><span>Observaciones</span>${p.observaciones}</div>`:''}
      </div>
      <div class="divider"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">Items del pedido</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Producto ID</th><th>Cantidad</th><th>Precio unit.</th><th>Subtotal</th></tr></thead>
        <tbody>
          ${p.items.map(i=>`
            <tr>
              <td class="mono muted" style="font-size:11px">${i.producto_id.slice(0,12)}…</td>
              <td>${i.cantidad}</td>
              <td class="mono">$${parseFloat(i.precio_unitario).toLocaleString('es-AR')}</td>
              <td class="mono">$${parseFloat(i.subtotal).toLocaleString('es-AR')}</td>
            </tr>`).join('')}
        </tbody>
      </table></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        ${p.estado==='pendiente'?`
          <button class="btn btn-success btn-sm" onclick="patchPedido('${p.id}','en_ruta')">→ En ruta</button>
          <button class="btn btn-danger btn-sm" onclick="patchPedido('${p.id}','cancelado')">Cancelar</button>`:''}
        ${p.estado==='en_ruta'?`
          <button class="btn btn-success btn-sm" onclick="patchPedido('${p.id}','entregado')">✓ Entregado</button>
          <button class="btn btn-danger btn-sm" onclick="patchPedido('${p.id}','no_entregado')">No entregado</button>`:''}
      </div>`);
  }catch(e){ toast(e.message,'err'); }
}

async function patchPedido(id, estado){
  try{
    await api(`/api/v1/pedidos/${id}`,{method:'PATCH',body:JSON.stringify({estado})});
    toast(`Pedido → ${estado}`); closeModal(); pgPedidos();
  }catch(e){ toast(e.message,'err'); }
}

async function modalNuevoPedido(){
  let clientes=[], productos=[];
  try{ [clientes,productos] = await Promise.all([api('/api/v1/clientes/'),api('/api/v1/productos/')]); }catch(e){}
  window._pItems = [];
  window._pProds = productos;
  openModal(`
    <h3>Nuevo pedido</h3>
    <div class="field"><label>Cliente *</label>
      <select id="np-cli">
        <option value="">Seleccioná un cliente…</option>
        ${clientes.filter(c=>c.estado==='activo').map(c=>`<option value="${c.id}">${c.razon_social}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Fecha de entrega</label><input id="np-fecha" type="date"/></div>
    <div class="field"><label>Observaciones</label><textarea id="np-obs" rows="2"></textarea></div>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.7px">Items</div>
    <div id="np-items-wrap"></div>
    <button class="btn btn-ghost" style="width:100%;margin-bottom:4px" onclick="addPedidoItem()">+ Agregar producto</button>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearPedido()">Crear pedido</button>
    </div>`);
  addPedidoItem();
}

let _itemIdx = 0;
function addPedidoItem(){
  const prods = window._pProds||[];
  const i = _itemIdx++;
  const d = document.createElement('div');
  d.className = 'form-3';
  d.id = `pi-row-${i}`;
  d.innerHTML = `
    <div class="field" style="margin:0"><select id="pi-p-${i}">
      <option value="">Producto…</option>
      ${prods.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}
    </select></div>
    <div class="field" style="margin:0"><input id="pi-c-${i}" type="number" step="0.001" min="0.001" placeholder="Cant."/></div>
    <div class="field" style="margin:0"><input id="pi-pr-${i}" type="number" step="0.01" min="0" placeholder="Precio (opt.)"/></div>`;
  document.getElementById('np-items-wrap').appendChild(d);
}

async function crearPedido(){
  const cliente_id = document.getElementById('np-cli').value;
  if(!cliente_id){ toast('Seleccioná un cliente','err'); return; }
  const items=[];
  for(let i=0;i<_itemIdx;i++){
    const pid  = document.getElementById(`pi-p-${i}`)?.value;
    const cant = document.getElementById(`pi-c-${i}`)?.value;
    const pr   = document.getElementById(`pi-pr-${i}`)?.value;
    if(pid&&cant) items.push({producto_id:pid,cantidad:parseFloat(cant),...(pr?{precio_unitario:parseFloat(pr)}:{})});
  }
  if(!items.length){ toast('Agregá al menos un producto','err'); return; }
  const b = {
    cliente_id, items,
    fecha_entrega: document.getElementById('np-fecha').value||null,
    observaciones: document.getElementById('np-obs').value||null,
  };
  try{
    await api('/api/v1/pedidos/',{method:'POST',body:JSON.stringify(b)});
    toast('Pedido creado'); closeModal(); _itemIdx=0; pgPedidos();
  }catch(e){ toast(e.message,'err'); }
}

function pgComingSoon(){
  setContent('<div class="empty"><div class="empty-icon">🚧</div>Módulo en desarrollo</div>');
}
</script>
