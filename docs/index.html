<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel DGC — Validación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--surface:#181c27;--card:#1e2235;--border:#2a2f45;
  --accent:#4f7cff;--accent2:#00d4aa;--warn:#ff6b6b;--orange:#f59e0b;
  --text:#e8eaf0;--muted:#7b82a0;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
#sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600}.logo-title span{color:var(--accent)}
.logo small{display:block;font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(79,124,255,.13);color:var(--accent)}
.nav-item.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;background:var(--bg);position:sticky;top:0;z-index:50}
.page-title{font-size:15px;font-weight:600;flex:1}
#content{padding:24px 28px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3a6aff}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,107,107,.12);color:var(--warn);border:1px solid rgba(255,107,107,.25)}.btn-danger:hover{background:rgba(255,107,107,.2)}
.btn-success{background:rgba(0,212,170,.12);color:var(--accent2);border:1px solid rgba(0,212,170,.25)}
.btn-sm{padding:4px 10px;font-size:12px}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:380px}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13.5px;font-family:var(--font);outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-header h3{font-size:14px;font-weight:600;flex:1}
.search-input{padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:220px}
.search-input:focus{border-color:var(--accent)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface);padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:500}
tbody tr{border-top:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 14px;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-activo,.b-entregado{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-inactivo,.b-cancelado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-pendiente{background:rgba(79,124,255,.12);color:var(--accent)}
.b-en_ruta,.b-bloqueado{background:rgba(245,158,11,.12);color:var(--orange)}
.b-no_entregado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-mayorista{background:rgba(79,124,255,.12);color:var(--accent)}
.b-minorista{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-especial{background:rgba(245,158,11,.12);color:var(--orange)}
.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.stat-value{font-size:26px;font-weight:600;margin:4px 0 2px;font-family:var(--mono)}
.stat-sub{font-size:11.5px;color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
.detail-item span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.mono{font-family:var(--mono);font-size:12px}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:13.5px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.4);color:var(--accent2)}
#toast.err{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:var(--warn)}
.loading-page{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
.lista-info-box{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-size:13px;min-height:38px;display:flex;align-items:center}
.items-grid-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:6px}
.items-grid-header div{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center}
.item-row select,.item-row input{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%}
.item-row input:focus,.item-row select:focus{border-color:var(--accent)}
.item-row .subtotal{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
.btn-remove{background:none;border:none;color:var(--warn);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.total-row{text-align:right;font-size:14px;font-weight:600;font-family:var(--mono);margin-top:8px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Sistema DGC</h2>
    <p>Panel de validación — conecta con tu API en Render</p>
    <div class="field"><label>URL de la API</label><input id="inp-api" value="https://gestion-dgc-api.onrender.com" style="font-family:var(--mono);font-size:12px"/></div>
    <div class="field"><label>Email</label><input id="inp-email" type="email" value="admin@sistema.com"/></div>
    <div class="field"><label>Contraseña</label><input id="inp-pass" type="password" placeholder="••••••••"/></div>
    <div id="login-err" style="color:var(--warn);font-size:12px;min-height:18px;margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar al sistema</button>
  </div>
</div>

<div id="sidebar">
  <div class="logo">
    <div class="logo-title">Sistema <span>DGC</span></div>
    <small>Panel de validación</small>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" data-page="dashboard" onclick="goTo(this)"><span class="nav-icon">◼</span>Dashboard</div>
    <div class="nav-section">Operaciones</div>
    <div class="nav-item" data-page="clientes" onclick="goTo(this)"><span class="nav-icon">👤</span>Clientes</div>
    <div class="nav-item" data-page="productos" onclick="goTo(this)"><span class="nav-icon">📦</span>Productos</div>
    <div class="nav-item" data-page="precios" onclick="goTo(this)"><span class="nav-icon">🏷️</span>Listas de precios</div>
    <div class="nav-item" data-page="pedidos" onclick="goTo(this)"><span class="nav-icon">📋</span>Pedidos</div>
    <div class="nav-section">Próximamente</div>
    <div class="nav-item disabled"><span class="nav-icon">🚚</span>Rutas</div>
    <div class="nav-item" data-page="remitos" onclick="goTo(this)"><span class="nav-icon">📄</span>Remitos</div>
    <div class="nav-item disabled"><span class="nav-icon">💰</span>Cobranzas</div>
    <div class="nav-item disabled"><span class="nav-icon">🏦</span>Cheques</div>
    <div class="nav-item disabled"><span class="nav-icon">🏭</span>Proveedores</div>
    <div class="nav-item disabled"><span class="nav-icon">💸</span>Gastos</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar" id="user-av">A</div>
      <div>
        <div style="font-size:12.5px;font-weight:500" id="user-name">—</div>
        <div style="font-size:11px;color:var(--muted)" id="user-role">—</div>
      </div>
    </div>
    <div class="nav-item" onclick="doLogout()" style="margin-top:4px"><span class="nav-icon">↩</span>Cerrar sesión</div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div id="topbar-actions"></div>
  </div>
  <div id="content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
<div id="toast"></div>

<script>
let API='https://gestion-dgc-api.onrender.com', TOKEN=null;

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin(){
  API=document.getElementById('inp-api').value.replace(/\/+$/,'');
  const email=document.getElementById('inp-email').value;
  const pass=document.getElementById('inp-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.textContent='Conectando…';
  try{
    const r=await fetch(`${API}/api/v1/usuarios/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    if(!r.ok){errEl.textContent='Email o contraseña incorrectos';return;}
    const d=await r.json();
    TOKEN=d.access_token;
    document.getElementById('user-name').textContent=d.usuario.nombre;
    document.getElementById('user-role').textContent=d.usuario.rol;
    document.getElementById('user-av').textContent=d.usuario.nombre[0].toUpperCase();
    document.getElementById('login-screen').style.display='none';
    goTo(document.querySelector('.nav-item[data-page="dashboard"]'));
  }catch(e){errEl.textContent='No se pudo conectar. Verificá la URL.';}
}
document.getElementById('inp-pass').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
function doLogout(){TOKEN=null;document.getElementById('login-screen').style.display='flex';document.getElementById('inp-pass').value='';}

async function api(path,opts={}){
  const r=await fetch(`${API}${path}`,{...opts,headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const err=await r.json().catch(()=>({detail:'Error desconocido'}));throw new Error(Array.isArray(err.detail)?err.detail.map(e=>e.msg).join(', '):(err.detail||r.statusText));}
  if(r.status===204)return null;
  return r.json();
}

// ── ROUTER ───────────────────────────────────────────────────
const PAGE_TITLES={dashboard:'Dashboard',clientes:'Clientes',productos:'Productos',precios:'Listas de precios',pedidos:'Pedidos',remitos:'Remitos'};
const PAGE_FNS={dashboard:pgDashboard,clientes:pgClientes,productos:pgProductos,precios:pgPrecios,pedidos:pgPedidos,remitos:pgRemitos};
function goTo(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const page=el.dataset.page;
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  document.getElementById('topbar-actions').innerHTML='';
  setContent('<div class="loading-page"><div class="spinner"></div> Cargando…</div>');
  (PAGE_FNS[page]||pgComingSoon)();
}
function setContent(html){document.getElementById('content').innerHTML=html;}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',3200);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function badge(val){return `<span class="badge b-${val}">${val.replace(/_/g,' ')}</span>`;}
function filtrar(q,tbodyId){document.querySelectorAll(`#${tbodyId} tr`).forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});}

// ══════════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════════
async function pgDashboard(){
  try{
    const [clientes,productos,pedidos]=await Promise.all([api('/api/v1/clientes/'),api('/api/v1/productos/'),api('/api/v1/pedidos/')]);
    const activos=clientes.filter(c=>c.estado==='activo').length;
    const pendientes=pedidos.filter(p=>p.estado==='pendiente').length;
    const entregados=pedidos.filter(p=>p.estado==='entregado').length;
    const facturado=pedidos.filter(p=>p.estado==='entregado').reduce((s,p)=>s+parseFloat(p.total||0),0);
    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Clientes activos</div><div class="stat-value" style="color:var(--accent)">${activos}</div><div class="stat-sub">${clientes.length} total</div></div>
        <div class="stat-card"><div class="stat-label">Productos</div><div class="stat-value">${productos.length}</div><div class="stat-sub">en catálogo</div></div>
        <div class="stat-card"><div class="stat-label">Pedidos pendientes</div><div class="stat-value" style="color:var(--orange)">${pendientes}</div><div class="stat-sub">${entregados} entregados</div></div>
        <div class="stat-card"><div class="stat-label">Total facturado</div><div class="stat-value" style="color:var(--accent2)">$${facturado.toLocaleString('es-AR',{minimumFractionDigits:0})}</div><div class="stat-sub">pedidos entregados</div></div>
      </div>
      <div class="section-header"><h3>Últimos pedidos</h3></div>
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>
          ${pedidos.slice(0,10).map(p=>`<tr><td class="mono">${p.id.slice(0,8)}…</td><td>${p.fecha_pedido}</td><td class="mono">$${parseFloat(p.total).toLocaleString('es-AR')}</td><td>${badge(p.estado)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">Sin pedidos aún</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

// ══════════════════════════════════════════════════════════════
//  CLIENTES
// ══════════════════════════════════════════════════════════════
async function pgClientes(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="modalNuevoCliente()">+ Nuevo cliente</button>`;
  try{
    const [rows,listas]=await Promise.all([api('/api/v1/clientes/'),api('/api/v1/precios/')]);
    const listaMap={};listas.forEach(l=>listaMap[l.id]=l);
    setContent(`
      <div class="section-header">
        <h3>${rows.length} clientes</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-clientes')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Razón social</th><th>CUIT</th><th>Teléfono</th><th>Localidad</th><th>Lista de precios</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-clientes">
          ${rows.map(c=>{
            const lista=listaMap[c.lista_precios_id];
            return `<tr>
              <td><strong>${c.razon_social}</strong></td>
              <td class="mono">${c.cuit||'—'}</td>
              <td class="mono">${c.telefono||'—'}</td>
              <td>${c.localidad||'—'}</td>
              <td>${lista?`<span class="badge b-${lista.tipo}">${lista.nombre}</span>`:`<span class="muted">—</span>`}</td>
              <td>${badge(c.estado)}</td>
              <td style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm" onclick="modalEditarCliente('${c.id}')">Editar</button>
                <button class="btn btn-ghost btn-sm" onclick="verCliente('${c.id}')">Ver</button>
              </td>
            </tr>`;
          }).join('')||'<tr><td colspan="7" class="empty">Sin clientes</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

async function modalNuevoCliente(){
  let listas=[];try{listas=await api('/api/v1/precios/');}catch(e){}
  openModal(`
    <h3>Nuevo cliente</h3>
    <div class="form-row">
      <div class="field"><label>Razón social *</label><input id="f-rs" placeholder="Empresa S.A."/></div>
      <div class="field"><label>CUIT</label><input id="f-cuit" placeholder="20-12345678-9"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Teléfono</label><input id="f-tel" placeholder="351 000 0000"/></div>
      <div class="field"><label>Email</label><input id="f-email" type="email"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Dirección</label><input id="f-dir"/></div>
      <div class="field"><label>Localidad</label><input id="f-loc" placeholder="Córdoba"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Condición IVA</label>
        <select id="f-iva">
          <option value="consumidor_final">Consumidor final</option>
          <option value="responsable_inscripto">Responsable inscripto</option>
          <option value="monotributo">Monotributo</option>
          <option value="exento">Exento</option>
        </select>
      </div>
      <div class="field"><label>Lista de precios</label>
        <select id="f-lista">
          <option value="">Sin lista</option>
          ${listas.map(l=>`<option value="${l.id}">${l.nombre} (${l.tipo})</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearCliente()">Crear cliente</button>
    </div>`);
}

async function crearCliente(){
  const b={razon_social:document.getElementById('f-rs').value,cuit:document.getElementById('f-cuit').value||null,telefono:document.getElementById('f-tel').value||null,email:document.getElementById('f-email').value||null,direccion:document.getElementById('f-dir').value||null,localidad:document.getElementById('f-loc').value||null,condicion_iva:document.getElementById('f-iva').value,lista_precios_id:document.getElementById('f-lista').value||null};
  if(!b.razon_social){toast('La razón social es obligatoria','err');return;}

async function onClienteChange(clienteId){
  const infoEl=document.getElementById('np-lista-info');
  if(!clienteId){infoEl.textContent='— seleccioná un cliente';infoEl.style.color='var(--muted)';window._pPrecioMap={};return;}
  const cliente=window._pClientes.find(c=>c.id===clienteId);
  const listaId=cliente?.lista_precios_id;
  if(!listaId){
    infoEl.innerHTML='<span style="color:var(--warn)">⚠ Sin lista — ingresá precios manualmente</span>';
    window._pPrecioMap={};return;
  }
  try{
    const lista=await api(`/api/v1/precios/${listaId}`);
    const meta=window._pListas.find(l=>l.id===listaId);
    infoEl.innerHTML=`<span style="color:var(--accent2)">✓</span> <strong>${lista.nombre}</strong> <span class="badge b-${meta?.tipo||'minorista'}" style="margin-left:6px">${meta?.tipo||''}</span> — ${lista.items.length} prod. con precio`;
    window._pPrecioMap={};
    lista.items.forEach(i=>window._pPrecioMap[i.producto_id]=i.precio);
    // Actualizar precios de los items ya agregados
    for(let i=0;i<_itemIdx;i++){
      const pidEl=document.getElementById(`pi-p-${i}`);
      if(pidEl?.value)autoFillPrecio(i,pidEl.value);
    }
  }catch(e){infoEl.innerHTML='<span style="color:var(--warn)">Error cargando lista</span>';}
}

function autoFillPrecio(idx,productoId){
  const precioEl=document.getElementById(`pi-pr-${idx}`);
  if(!precioEl)return;
  const precio=window._pPrecioMap[productoId];
  if(precio){precioEl.value=precio;precioEl.style.borderColor='var(--accent2)';}
  else{precioEl.value='';precioEl.style.borderColor='var(--border)';}
  recalcTotal();
}

function recalcTotal(){
  let total=0;
  for(let i=0;i<_itemIdx;i++){
    const cant=parseFloat(document.getElementById(`pi-c-${i}`)?.value||0);
    const precio=parseFloat(document.getElementById(`pi-pr-${i}`)?.value||0);
    const sub=cant*precio;total+=sub;
    const subEl=document.getElementById(`pi-sub-${i}`);
    if(subEl)subEl.textContent=sub>0?`$${sub.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—';
  }
  const el=document.getElementById('np-total');
  if(el)el.textContent=`$${total.toLocaleString('es-AR',{minimumFractionDigits:2})}`;
}

function addItem(){
  const prods=window._pProds||[];
  const i=_itemIdx++;
  const d=document.createElement('div');
  d.className='item-row';d.id=`pi-row-${i}`;
  d.innerHTML=`
    <select id="pi-p-${i}" onchange="autoFillPrecio(${i},this.value)">
      <option value="">Producto…</option>
      ${generarOpcionesProductos(prods)}
    </select>
    <input id="pi-c-${i}" type="number" step="0.001" min="0.001" placeholder="Cantidad" oninput="recalcTotal()"/>
    <input id="pi-pr-${i}" type="number" step="0.01" min="0" placeholder="Precio" oninput="recalcTotal()"/>
    <span id="pi-sub-${i}" class="subtotal">—</span>
    <button class="btn-remove" onclick="removeItem(${i})">✕</button>`;
  document.getElementById('np-items-wrap').appendChild(d);
}

function removeItem(i){
  document.getElementById(`pi-row-${i}`)?.remove();
  recalcTotal();
}

async function crearPedido(){
  const cliente_id=document.getElementById('np-cli').value;
  if(!cliente_id){toast('Seleccioná un cliente','err');return;}
  const items=[];
  for(let i=0;i<_itemIdx;i++){
    const pid=document.getElementById(`pi-p-${i}`)?.value;
    const cant=document.getElementById(`pi-c-${i}`)?.value;
    const pr=document.getElementById(`pi-pr-${i}`)?.value;
    if(pid&&cant)items.push({producto_id:pid,cantidad:parseFloat(cant),...(pr?{precio_unitario:parseFloat(pr)}:{})});
  }
  if(!items.length){toast('Agregá al menos un producto','err');return;}
  const b={cliente_id,items,fecha_entrega:document.getElementById('np-fecha').value||null,observaciones:document.getElementById('np-obs').value||null,forma_pago:document.getElementById('np-fpago').value};
  try{await api('/api/v1/pedidos/',{method:'POST',body:JSON.stringify(b)});toast('Pedido creado');closeModal();_itemIdx=0;pgPedidos();}catch(e){toast(e.message,'err');}
}

function generarOpcionesProductos(prods){
  // Agrupar por subcategoría para el selector
  const grupos={};
  prods.forEach(p=>{
    const g=p.subcategoria||p.categoria||'otros';
    if(!grupos[g])grupos[g]=[];
    grupos[g].push(p);
  });
  const labels={
    cortes_vaca:'Cortes de Vaca',cortes_cerdo:'Cortes de Cerdo',
    pollo:'Pollo',embutidos:'Embutidos',achuras:'Achuras',
    fiambres:'Fiambres',procesados:'Procesados',milanesas:'Milanesas',
    escabeches:'Escabeches',otros:'Otros'
  };
  return Object.entries(grupos).map(([g,ps])=>
    `<optgroup label="${labels[g]||g}">
      ${ps.map(p=>`<option value="${p.id}">${p.nombre} (${p.unidad_medida})</option>`).join('')}
    </optgroup>`
  ).join('');
}

async function pgRemitos(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="modalNuevoRemito()">+ Nuevo remito</button>`;
  try{
    const remitos=await api('/api/v1/remitos/');
    setContent(`
      <div class="section-header">
        <h3>${remitos.length} remitos</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-rem')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Número</th><th>Fecha</th><th>Cliente</th><th>Pedidos</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-rem">
          ${remitos.map(r=>`<tr>
            <td><strong class="mono">${r.numero}</strong></td>
            <td>${r.fecha}</td>
            <td class="mono muted" style="font-size:11px">${r.cliente_id.slice(0,8)}…</td>
            <td class="muted" style="font-size:12px">${r.pedido_ids?.length||0} pedido(s)</td>
            <td>${badge(r.estado)}</td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="verRemito('${r.id}')">Ver</button>
              <button class="btn btn-primary btn-sm" onclick="imprimirRemito('${r.id}')">PDF</button>
            </td>
          </tr>`).join('')||'<tr><td colspan="6" class="empty">Sin remitos aún</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

async function modalNuevoRemito(){
  // Traer pedidos entregados o pendientes que no tengan remito
  let pedidos=[], clientes=[];
  try{
    [pedidos, clientes]=await Promise.all([api('/api/v1/pedidos/'),api('/api/v1/clientes/')]);
  }catch(e){}
  const cliMap={};clientes.forEach(c=>cliMap[c.id]=c.razon_social);
  const disponibles=pedidos.filter(p=>['pendiente','en_ruta','entregado'].includes(p.estado));

  if(!disponibles.length){
    openModal(`<h3>Nuevo remito</h3><div class="empty">No hay pedidos disponibles para generar remitos</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
    return;
  }

  openModal(`
    <h3>Nuevo remito</h3>
    <p class="muted" style="font-size:12px;margin-bottom:14px">Seleccioná uno o más pedidos del mismo cliente</p>
    <div class="field"><label>Observaciones</label><textarea id="nr-obs" rows="2"></textarea></div>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">Pedidos disponibles</div>
    <div style="max-height:280px;overflow-y:auto">
      ${disponibles.map(p=>`
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:7px;margin-bottom:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" value="${p.id}" class="pedido-check" style="width:16px;height:16px;accent-color:var(--accent)"/>
          <div style="flex:1">
            <strong>${cliMap[p.cliente_id]||p.cliente_id.slice(0,8)+'…'}</strong>
            <span class="muted" style="font-size:11px;margin-left:8px">${p.fecha_pedido}</span>
          </div>
          <span class="mono" style="font-size:12px">$${parseFloat(p.total).toLocaleString('es-AR')}</span>
          ${badge(p.estado)}
        </label>`).join('')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearRemito()">Generar remito</button>
    </div>`);
}

async function crearRemito(){
  const checks=document.querySelectorAll('.pedido-check:checked');
  if(!checks.length){toast('Seleccioná al menos un pedido','err');return;}
  const pedido_ids=[...checks].map(c=>c.value);
  const obs=document.getElementById('nr-obs').value||null;
  try{
    const r=await api('/api/v1/remitos/',{method:'POST',body:JSON.stringify({pedido_ids,observaciones:obs})});
    toast(`Remito ${r.numero} generado`);
    closeModal();
    imprimirRemito(r.id);
    pgRemitos();
  }catch(e){toast(e.message,'err');}
}

async function verRemito(id){
  try{
    const r=await api(`/api/v1/remitos/${id}`);
    openModal(`
      <h3>Remito ${r.numero}</h3>
      <div class="detail-grid" style="margin-bottom:14px">
        <div class="detail-item"><span>Cliente</span><strong>${r.cliente_nombre}</strong></div>
        <div class="detail-item"><span>Fecha</span>${r.fecha}</div>
        <div class="detail-item"><span>CUIT</span>${r.cliente_cuit||'—'}</div>
        <div class="detail-item"><span>Condición IVA</span>${r.cliente_condicion_iva}</div>
        <div class="detail-item"><span>Dirección</span>${r.cliente_direccion||'—'}</div>
        <div class="detail-item"><span>Forma de pago</span>${r.forma_pago?.replace('_',' ')||'—'}</div>
      </div>
      <div class="divider"></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio unit.</th><th>Subtotal</th></tr></thead>
        <tbody>${r.items.map(i=>`<tr>
          <td>${i.producto_nombre}</td>
          <td class="mono">${i.cantidad} ${i.producto_unidad}</td>
          <td class="mono">$${parseFloat(i.precio_unitario).toLocaleString('es-AR')}</td>
          <td class="mono">$${parseFloat(i.subtotal).toLocaleString('es-AR')}</td>
        </tr>`).join('')}</tbody>
      </table></div>
      <div style="text-align:right;margin-top:10px;font-weight:600;font-family:var(--mono)">
        TOTAL: $${parseFloat(r.total).toLocaleString('es-AR')}
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        ${r.estado==='emitido'?`<button class="btn btn-danger btn-sm" onclick="anularRemito('${r.id}')">Anular</button>`:''}
        <button class="btn btn-primary" onclick="imprimirRemito('${r.id}')">Imprimir PDF</button>
      </div>`);
  }catch(e){toast(e.message,'err');}
}

async function anularRemito(id){
  if(!confirm('¿Anular este remito?'))return;
  try{
    await api(`/api/v1/remitos/${id}`,{method:'PATCH',body:JSON.stringify({estado:'anulado'})});
    toast('Remito anulado');closeModal();pgRemitos();
  }catch(e){toast(e.message,'err');}
}

async function imprimirRemito(id){
  try{
    const r=await api(`/api/v1/remitos/${id}`);
    const win=window.open('','_blank');
    win.document.write(generarHTMLRemito(r));
    win.document.close();
    win.focus();
    setTimeout(()=>win.print(),800);
  }catch(e){toast(e.message,'err');}
}
