<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel DGC — Validación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--surface:#181c27;--card:#1e2235;--border:#2a2f45;
  --accent:#4f7cff;--accent2:#00d4aa;--warn:#ff6b6b;--orange:#f59e0b;
  --text:#e8eaf0;--muted:#7b82a0;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
#sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600}.logo-title span{color:var(--accent)}
.logo small{display:block;font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--muted);transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(79,124,255,.13);color:var(--accent)}
.nav-item.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;background:var(--bg);position:sticky;top:0;z-index:50}
.page-title{font-size:15px;font-weight:600;flex:1}
#content{padding:24px 28px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3a6aff}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,107,107,.12);color:var(--warn);border:1px solid rgba(255,107,107,.25)}.btn-danger:hover{background:rgba(255,107,107,.2)}
.btn-success{background:rgba(0,212,170,.12);color:var(--accent2);border:1px solid rgba(0,212,170,.25)}
.btn-sm{padding:4px 10px;font-size:12px}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:380px}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13.5px;font-family:var(--font);outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-header h3{font-size:14px;font-weight:600;flex:1}
.search-input{padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;width:220px}
.search-input:focus{border-color:var(--accent)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--surface);padding:10px 14px;text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:500}
tbody tr{border-top:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 14px;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-activo,.b-entregado{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-inactivo,.b-cancelado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-pendiente{background:rgba(79,124,255,.12);color:var(--accent)}
.b-en_ruta,.b-bloqueado{background:rgba(245,158,11,.12);color:var(--orange)}
.b-no_entregado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-mayorista{background:rgba(79,124,255,.12);color:var(--accent)}
.b-minorista{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-especial{background:rgba(245,158,11,.12);color:var(--orange)}
/* ── Cheques badges ── */
.b-emitido{background:rgba(79,124,255,.12);color:var(--accent)}
.b-en_transito{background:rgba(245,158,11,.12);color:var(--orange)}
.b-debitado{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-rechazado{background:rgba(255,107,107,.12);color:var(--warn)}
.b-anulado{background:rgba(123,130,160,.12);color:var(--muted)}
.b-en_ventana{background:rgba(168,85,247,.12);color:#a855f7}
.b-vencido_sin_depositar{background:rgba(255,107,107,.18);color:var(--warn);border:1px solid rgba(255,107,107,.3)}
/* ── Circulación ── */
.ventana-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:4px}
.ventana-bar{height:100%;border-radius:4px;transition:width .4s}
.circ-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px}
.circ-card.critico{border-color:rgba(255,107,107,.5);background:rgba(255,107,107,.04)}
.circ-card.proximo{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.03)}
.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.stat-value{font-size:26px;font-weight:600;margin:4px 0 2px;font-family:var(--mono)}
.stat-sub{font-size:11.5px;color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:520px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
.detail-item span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.mono{font-family:var(--mono);font-size:12px}
.muted{color:var(--muted)}
.divider{height:1px;background:var(--border);margin:16px 0}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:13.5px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.ok{background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.4);color:var(--accent2)}
#toast.err{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:var(--warn)}
.loading-page{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--muted)}
.lista-info-box{padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-size:13px;min-height:38px;display:flex;align-items:center}
.items-grid-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:6px}
.items-grid-header div{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center}
.item-row select,.item-row input{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%}
.item-row input:focus,.item-row select:focus{border-color:var(--accent)}
.item-row .subtotal{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right}
.btn-remove{background:none;border:none;color:var(--warn);cursor:pointer;font-size:16px;padding:4px;line-height:1}
.total-row{text-align:right;font-size:14px;font-weight:600;font-family:var(--mono);margin-top:8px}
/* ── Cheques: alerta vencimiento ── */
.alert-vencimiento{background:rgba(245,158,11,.08);border-left:3px solid var(--orange);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.alert-vencimiento strong{color:var(--orange)}
.chip-vence{display:inline-block;background:var(--orange);color:#fff;padding:1px 8px;border-radius:10px;font-size:11px;margin-left:6px;font-family:var(--mono)}
/* ── Cheques: filtros bar ── */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters-bar select,.filters-bar input{padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.filters-bar select:focus,.filters-bar input:focus{border-color:var(--accent)}
/* ── Cheques: pestañas ── */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab-btn{padding:8px 18px;border-radius:7px 7px 0 0;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:var(--font);background:transparent;color:var(--muted);transition:all .15s;position:relative;bottom:-1px;border:1px solid transparent;border-bottom:none}
.tab-btn:hover{color:var(--text);background:var(--card)}
.tab-btn.active{background:var(--surface);color:var(--accent);border-color:var(--border);border-bottom-color:var(--surface)}
/* ── Cartera: timeline ── */
.timeline-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;overflow-x:auto}
.timeline-track{position:relative;height:56px;min-width:600px;margin:8px 0 24px}
.timeline-axis{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border)}
.timeline-tick{position:absolute;bottom:0;width:1px;background:var(--border);height:8px}
.timeline-tick-label{position:absolute;bottom:-18px;font-size:10px;color:var(--muted);font-family:var(--mono);transform:translateX(-50%);white-space:nowrap}
.timeline-dot{position:absolute;width:12px;height:12px;border-radius:50%;top:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform .15s;z-index:2}
.timeline-dot:hover{transform:translate(-50%,-50%) scale(1.5)}
.timeline-dot-label{position:absolute;top:-28px;font-size:10px;font-family:var(--mono);white-space:nowrap;transform:translateX(-50%);pointer-events:none}
/* ── Cartera: calendario ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-header{text-align:center;font-size:10px;color:var(--muted);padding:4px;text-transform:uppercase;letter-spacing:.5px}
.cal-cell{min-height:52px;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 5px;font-size:11px;position:relative;transition:background .1s}
.cal-cell.has-cheque{border-color:var(--orange);cursor:pointer}
.cal-cell.has-cheque:hover{background:rgba(245,158,11,.08)}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.out-month{opacity:.3}
.cal-day{font-size:10px;color:var(--muted);font-family:var(--mono)}
.cal-monto{font-size:10px;font-family:var(--mono);color:var(--orange);font-weight:600;margin-top:2px;line-height:1.2}
.cal-count{font-size:9px;color:var(--muted)}
/* ── Cartera: acumulado ── */
.acum-bar{height:6px;border-radius:3px;background:var(--accent);transition:width .3s}
/* ── Proveedores / Gastos badges ── */
.b-pagado{background:rgba(0,212,170,.12);color:var(--accent2)}
.b-pendiente-g{background:rgba(79,124,255,.12);color:var(--accent)}
.b-anulado-g{background:rgba(123,130,160,.12);color:var(--muted)}
.b-materias_primas{background:rgba(168,85,247,.12);color:#a855f7}
.b-servicios{background:rgba(79,124,255,.12);color:var(--accent)}
.b-fletes{background:rgba(245,158,11,.12);color:var(--orange)}
.b-impuestos{background:rgba(255,107,107,.12);color:var(--warn)}
.b-mantenimiento{background:rgba(52,211,153,.12);color:#34d399}
.b-otros-g{background:rgba(123,130,160,.12);color:var(--muted)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Sistema DGC</h2>
    <p>Panel de validación — conecta con tu API en Render</p>
    <div class="field"><label>URL de la API</label><input id="inp-api" value="https://gestion-dgc-api.onrender.com" style="font-family:var(--mono);font-size:12px"/></div>
    <div class="field"><label>Email</label><input id="inp-email" type="email" value="admin@sistema.com"/></div>
    <div class="field"><label>Contraseña</label><input id="inp-pass" type="password" placeholder="••••••••"/></div>
    <div id="login-err" style="color:var(--warn);font-size:12px;min-height:18px;margin-bottom:10px"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar al sistema</button>
  </div>
</div>

<div id="sidebar">
  <div class="logo">
    <div class="logo-title">Sistema <span>DGC</span></div>
    <small>Panel de validación</small>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" data-page="dashboard" onclick="goTo(this)"><span class="nav-icon">◼</span>Dashboard</div>
    <div class="nav-section">Operaciones</div>
    <div class="nav-item" data-page="clientes" onclick="goTo(this)"><span class="nav-icon">👤</span>Clientes</div>
    <div class="nav-item" data-page="productos" onclick="goTo(this)"><span class="nav-icon">📦</span>Productos</div>
    <div class="nav-item" data-page="precios" onclick="goTo(this)"><span class="nav-icon">🏷️</span>Listas de precios</div>
    <div class="nav-item" data-page="pedidos" onclick="goTo(this)"><span class="nav-icon">📋</span>Pedidos</div>
    <div class="nav-section">Próximamente</div>
    <div class="nav-item disabled"><span class="nav-icon">🚚</span>Rutas</div>
    <div class="nav-item" data-page="remitos" onclick="goTo(this)"><span class="nav-icon">📄</span>Remitos</div>
    <div class="nav-item" data-page="cuentas" onclick="goTo(this)"><span class="nav-icon">💰</span>Cuentas corrientes</div>
    <div class="nav-item" data-page="cheques" onclick="goTo(this)"><span class="nav-icon">🏦</span>Cheques emitidos</div>
    <div class="nav-item" data-page="proveedores" onclick="goTo(this)"><span class="nav-icon">🏭</span>Proveedores</div>
    <div class="nav-item" data-page="gastos" onclick="goTo(this)"><span class="nav-icon">💸</span>Gastos</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar" id="user-av">A</div>
      <div>
        <div style="font-size:12.5px;font-weight:500" id="user-name">—</div>
        <div style="font-size:11px;color:var(--muted)" id="user-role">—</div>
      </div>
    </div>
    <div class="nav-item" onclick="doLogout()" style="margin-top:4px"><span class="nav-icon">↩</span>Cerrar sesión</div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div id="topbar-actions"></div>
  </div>
  <div id="content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
<div id="toast"></div>

<script>
let API='https://gestion-dgc-api.onrender.com', TOKEN=null;

// ── AUTH ─────────────────────────────────────────────────────
async function doLogin(){
  API=document.getElementById('inp-api').value.replace(/\/+$/,'');
  const email=document.getElementById('inp-email').value;
  const pass=document.getElementById('inp-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.textContent='Conectando…';
  try{
    const r=await fetch(`${API}/api/v1/usuarios/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    if(!r.ok){errEl.textContent='Email o contraseña incorrectos';return;}
    const d=await r.json();
    TOKEN=d.access_token;
    document.getElementById('user-name').textContent=d.usuario.nombre;
    document.getElementById('user-role').textContent=d.usuario.rol;
    document.getElementById('user-av').textContent=d.usuario.nombre[0].toUpperCase();
    document.getElementById('login-screen').style.display='none';
    goTo(document.querySelector('.nav-item[data-page="dashboard"]'));
  }catch(e){errEl.textContent='No se pudo conectar. Verificá la URL.';}
}
document.getElementById('inp-pass').addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
function doLogout(){TOKEN=null;document.getElementById('login-screen').style.display='flex';document.getElementById('inp-pass').value='';}

async function api(path,opts={}){
  const r=await fetch(`${API}${path}`,{...opts,headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const err=await r.json().catch(()=>({detail:'Error desconocido'}));throw new Error(Array.isArray(err.detail)?err.detail.map(e=>e.msg).join(', '):(err.detail||r.statusText));}
  if(r.status===204)return null;
  return r.json();
}

// ── ROUTER ───────────────────────────────────────────────────
const PAGE_TITLES={dashboard:'Dashboard',clientes:'Clientes',productos:'Productos',precios:'Listas de precios',pedidos:'Pedidos',remitos:'Remitos',cuentas:'Cuentas corrientes',cheques:'Cheques emitidos',proveedores:'Proveedores',gastos:'Gastos'};
const PAGE_FNS={dashboard:pgDashboard,clientes:pgClientes,productos:pgProductos,precios:pgPrecios,pedidos:pgPedidos,remitos:pgRemitos,cuentas:pgCuentas,cheques:pgCheques,proveedores:pgProveedores,gastos:pgGastos};
function goTo(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const page=el.dataset.page;
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  document.getElementById('topbar-actions').innerHTML='';
  setContent('<div class="loading-page"><div class="spinner"></div> Cargando…</div>');
  (PAGE_FNS[page]||pgComingSoon)();
}
function setContent(html){document.getElementById('content').innerHTML=html;}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',3200);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}
function badge(val){return `<span class="badge b-${val}">${val.replace(/_/g,' ')}</span>`;}
function filtrar(q,tbodyId){document.querySelectorAll(`#${tbodyId} tr`).forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';});}

// ══════════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════════
async function pgDashboard(){
  try{
    const [clientes,productos,pedidos,cheques]=await Promise.all([
      api('/api/v1/clientes/'),api('/api/v1/productos/'),api('/api/v1/pedidos/'),
      api('/api/v1/cheques-emitidos/').catch(()=>[])
    ]);
    const activos=clientes.filter(c=>c.estado==='activo').length;
    const pendientes=pedidos.filter(p=>p.estado==='pendiente').length;
    const entregados=pedidos.filter(p=>p.estado==='entregado').length;
    const facturado=pedidos.filter(p=>p.estado==='entregado').reduce((s,p)=>s+parseFloat(p.total||0),0);
    const hoy=new Date(); hoy.setHours(0,0,0,0);
    const en30=new Date(hoy); en30.setDate(en30.getDate()+30);
    const chActivos=cheques.filter(c=>['emitido','en_transito','en_ventana'].includes(c.estado));
    const chProx7=chActivos.filter(c=>{const d=new Date(c.fecha_vencimiento+'T00:00:00');return d>=hoy&&d<=new Date(hoy.getTime()+7*86400000);});
    const chProx30=chActivos.filter(c=>{const d=new Date(c.fecha_vencimiento+'T00:00:00');return d>=hoy&&d<=en30;});
    const totalProx30=chProx30.reduce((s,c)=>s+parseFloat(c.monto||0),0);
    const chProx7Sorted=[...chProx7].sort((a,b)=>a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));
    const filasCh=chProx7Sorted.map(c=>{
      const dias=Math.round((new Date(c.fecha_vencimiento+'T00:00:00')-hoy)/86400000);
      return '<tr><td class="mono"><strong>'+c.numero+'</strong></td><td>'+c.beneficiario+'</td><td class="mono">$'+parseFloat(c.monto).toLocaleString('es-AR',{minimumFractionDigits:2})+'</td><td class="muted" style="font-size:12px">'+c.fecha_vencimiento+'</td><td><span style="font-family:var(--mono);font-weight:700;color:'+(dias<=3?'var(--warn)':'var(--orange)')+'">'+dias+'d</span></td></tr>';
    }).join('');
    const widgetAlerta=chProx7Sorted.length
      ?'<div style="font-size:11px;color:var(--warn);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">⚠️ Vencen en 7 días</div><div class="table-wrap"><table><thead><tr><th>N° Cheque</th><th>Beneficiario</th><th>Monto</th><th>Vencimiento</th><th>Días</th></tr></thead><tbody>'+filasCh+'</tbody></table></div>'
      :'<div style="color:var(--accent2);font-size:13px">✓ Sin cheques venciendo en los próximos 7 días</div>';
    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Clientes activos</div><div class="stat-value" style="color:var(--accent)">${activos}</div><div class="stat-sub">${clientes.length} total</div></div>
        <div class="stat-card"><div class="stat-label">Productos</div><div class="stat-value">${productos.length}</div><div class="stat-sub">en catálogo</div></div>
        <div class="stat-card"><div class="stat-label">Pedidos pendientes</div><div class="stat-value" style="color:var(--orange)">${pendientes}</div><div class="stat-sub">${entregados} entregados</div></div>
        <div class="stat-card"><div class="stat-label">Total facturado</div><div class="stat-value" style="color:var(--accent2)">$${facturado.toLocaleString('es-AR',{minimumFractionDigits:0})}</div><div class="stat-sub">pedidos entregados</div></div>
      </div>
      <div class="stats-row" style="grid-template-columns:1fr">
        <div class="stat-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div>
              <div class="stat-label">💳 Cartera de cheques — comprometido próximos 30 días</div>
              <div class="stat-value" style="color:var(--orange);font-size:22px">$${totalProx30.toLocaleString('es-AR',{minimumFractionDigits:0})}</div>
              <div class="stat-sub">${chProx30.length} cheque${chProx30.length!==1?'s':''} · ${chActivos.length} activos en cartera</div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="goTo(document.querySelector('[data-page=cheques]'));setTimeout(()=>switchTabCheques('cartera'),300)">Ver cartera →</button>
          </div>
          ${widgetAlerta}
        </div>
      </div>
      <div class="section-header"><h3>Últimos pedidos</h3></div>
      <div class="table-wrap"><table>
        <thead><tr><th>ID</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>
          ${pedidos.slice(0,10).map(p=>`<tr><td class="mono">${p.id.slice(0,8)}…</td><td>${p.fecha_pedido}</td><td class="mono">$${parseFloat(p.total).toLocaleString('es-AR')}</td><td>${badge(p.estado)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">Sin pedidos aún</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

let _itemIdx=0;

    <h3>Nuevo pedido</h3>
    <div class="form-row">
      <div class="field"><label>Cliente *</label>
        <select id="np-cli" onchange="onClienteChange(this.value)">

        </select>

    </div>

      <div class="field"><label>Forma de pago</label>
        <select id="np-fpago">
          <option value="cuenta_corriente">Cuenta corriente</option>

        </select>
      </div>
    </div>

    <div class="divider"></div>
    <div class="items-grid-header">
      <div>Producto</div><div>Cantidad</div><div>Precio $</div><div>Subtotal</div><div></div>
    </div>
    <div id="np-items-wrap"></div>

    <div class="modal-footer">

      <button class="btn btn-primary" onclick="crearPedido()">Crear pedido</button>
    </div>`);
  addItem();
}

async function onClienteChange(clienteId){
  const infoEl=document.getElementById('np-lista-info');
  if(!clienteId){infoEl.textContent='— seleccioná un cliente';infoEl.style.color='var(--muted)';window._pPrecioMap={};return;}
  const cliente=window._pClientes.find(c=>c.id===clienteId);
  const listaId=cliente?.lista_precios_id;
  if(!listaId){
    infoEl.innerHTML='<span style="color:var(--warn)">⚠ Sin lista — ingresá precios manualmente</span>';
    window._pPrecioMap={};return;
  }
  try{
    const lista=await api(`/api/v1/precios/${listaId}`);
    const meta=window._pListas.find(l=>l.id===listaId);
    infoEl.innerHTML=`<span style="color:var(--accent2)">✓</span> <strong>${lista.nombre}</strong> <span class="badge b-${meta?.tipo||'minorista'}" style="margin-left:6px">${meta?.tipo||''}</span> — ${lista.items.length} prod. con precio`;
    window._pPrecioMap={};
    lista.items.forEach(i=>window._pPrecioMap[i.producto_id]=i.precio);
    for(let i=0;i<_itemIdx;i++){
      const pidEl=document.getElementById(`pi-p-${i}`);
      if(pidEl?.value)autoFillPrecio(i,pidEl.value);
    }
  }catch(e){infoEl.innerHTML='<span style="color:var(--warn)">Error cargando lista</span>';}
}

function autoFillPrecio(idx,productoId){
  const precioEl=document.getElementById(`pi-pr-${idx}`);
  if(!precioEl)return;
  const precio=window._pPrecioMap[productoId];
  if(precio){precioEl.value=precio;precioEl.style.borderColor='var(--accent2)';}
  else{precioEl.value='';precioEl.style.borderColor='var(--border)';}
  recalcTotal();
}

function recalcTotal(){
  let total=0;
  for(let i=0;i<_itemIdx;i++){
    const cant=parseFloat(document.getElementById(`pi-c-${i}`)?.value||0);
    const precio=parseFloat(document.getElementById(`pi-pr-${i}`)?.value||0);
    const sub=cant*precio;total+=sub;
    const subEl=document.getElementById(`pi-sub-${i}`);
    if(subEl)subEl.textContent=sub>0?`$${sub.toLocaleString('es-AR',{minimumFractionDigits:2})}`:'—';
  }
  const el=document.getElementById('np-total');
  if(el)el.textContent=`$${total.toLocaleString('es-AR',{minimumFractionDigits:2})}`;
}

function addItem(){
  const prods=window._pProds||[];
  const i=_itemIdx++;
  const d=document.createElement('div');
  d.className='item-row';d.id=`pi-row-${i}`;
  d.innerHTML=`
    <select id="pi-p-${i}" onchange="autoFillPrecio(${i},this.value)">
      <option value="">Producto…</option>
      ${generarOpcionesProductos(prods)}
    </select>
    <input id="pi-c-${i}" type="number" step="0.001" min="0.001" placeholder="Cantidad" oninput="recalcTotal()"/>
    <input id="pi-pr-${i}" type="number" step="0.01" min="0" placeholder="Precio" oninput="recalcTotal()"/>
    <span id="pi-sub-${i}" class="subtotal">—</span>
    <button class="btn-remove" onclick="removeItem(${i})">✕</button>`;
  document.getElementById('np-items-wrap').appendChild(d);
}

function removeItem(i){
  document.getElementById(`pi-row-${i}`)?.remove();
  recalcTotal();
}

async function crearPedido(){
  const cliente_id=document.getElementById('np-cli').value;
  if(!cliente_id){toast('Seleccioná un cliente','err');return;}
  const items=[];
  for(let i=0;i<_itemIdx;i++){
    const pid=document.getElementById(`pi-p-${i}`)?.value;
    const cant=document.getElementById(`pi-c-${i}`)?.value;
    const pr=document.getElementById(`pi-pr-${i}`)?.value;
    if(pid&&cant)items.push({producto_id:pid,cantidad:parseFloat(cant),...(pr?{precio_unitario:parseFloat(pr)}:{})});
  }
  if(!items.length){toast('Agregá al menos un producto','err');return;}
  const b={cliente_id,items,fecha_entrega:document.getElementById('np-fecha').value||null,observaciones:document.getElementById('np-obs').value||null,forma_pago:document.getElementById('np-fpago').value};
  try{await api('/api/v1/pedidos/',{method:'POST',body:JSON.stringify(b)});toast('Pedido creado');closeModal();_itemIdx=0;pgPedidos();}catch(e){toast(e.message,'err');}
}

function generarOpcionesProductos(prods){
  const grupos={};
  prods.forEach(p=>{
    const g=p.subcategoria||p.categoria||'otros';
    if(!grupos[g])grupos[g]=[];
    grupos[g].push(p);
  });
  const labels={
    cortes_vaca:'Cortes de Vaca',cortes_cerdo:'Cortes de Cerdo',
    pollo:'Pollo',embutidos:'Embutidos',achuras:'Achuras',
    fiambres:'Fiambres',procesados:'Procesados',milanesas:'Milanesas',
    escabeches:'Escabeches',otros:'Otros'
  };
  return Object.entries(grupos).map(([g,ps])=>
    `<optgroup label="${labels[g]||g}">
      ${ps.map(p=>`<option value="${p.id}">${p.nombre} (${p.unidad_medida})</option>`).join('')}
    </optgroup>`
  ).join('');
}

async function crearRemito(){
  const checks=document.querySelectorAll('.pedido-check:checked');
  if(!checks.length){toast('Seleccioná al menos un pedido','err');return;}
  const pedido_ids=[...checks].map(c=>c.value);
  const obs=document.getElementById('nr-obs').value||null;
  try{
    const r=await api('/api/v1/remitos/',{method:'POST',body:JSON.stringify({pedido_ids,observaciones:obs})});
    toast(`Remito ${r.numero} generado`);
    closeModal();
    imprimirRemito(r.id);
    pgRemitos();
  }catch(e){toast(e.message,'err');}
}

function abrirWhatsApp(telefono, numeroRemito){
  const num = telefono.replace(/[\s\-\(\)\+]/g,'');
  const full = num.startsWith('54') ? num : `549${num}`;
  const texto = encodeURIComponent(`Hola! Te adjunto el Remito ${numeroRemito} de Don Gimenez. Quedo a disposición ante cualquier consulta.`);
  window.open(`https://wa.me/${full}?text=${texto}`, '_blank');
}

async function pgCuentas(){
  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn btn-ghost" onclick="pgCuentas()">↻ Actualizar</button>
    <button class="btn btn-primary" onclick="modalFiltrarCuentas()">Filtrar</button>`;
  try{
    const cuentas = await api('/api/v1/cuentas-corrientes/');
    const totalDeuda = cuentas.reduce((s,c)=>s+parseFloat(c.saldo_actual||0),0);
    const conDeuda   = cuentas.filter(c=>parseFloat(c.saldo_actual)>0).length;
    const sinDeuda   = cuentas.filter(c=>parseFloat(c.saldo_actual)<=0).length;

    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Total clientes</div><div class="stat-value">${cuentas.length}</div></div>
        <div class="stat-card"><div class="stat-label">Con deuda</div><div class="stat-value" style="color:var(--warn)">${conDeuda}</div></div>
        <div class="stat-card"><div class="stat-label">Al día</div><div class="stat-value" style="color:var(--accent2)">${sinDeuda}</div></div>
        <div class="stat-card"><div class="stat-label">Deuda total</div><div class="stat-value" style="color:var(--orange);font-size:20px">$${totalDeuda.toLocaleString('es-AR',{minimumFractionDigits:0})}</div></div>
      </div>
      <div class="section-header">
        <h3>Estado de cuentas</h3>
        <input class="search-input" placeholder="Buscar cliente…" oninput="filtrar(this.value,'tb-ctas')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Cliente</th><th>Localidad</th><th>Saldo deudor</th><th>Límite crédito</th><th>Últ. movimiento</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-ctas">
          ${cuentas.map(cc=>{
            const saldo=parseFloat(cc.saldo_actual);
            const color=saldo>0?'var(--warn)':saldo<0?'var(--accent2)':'var(--text)';
            const ult=cc.ultimo_movimiento?new Date(cc.ultimo_movimiento).toLocaleDateString('es-AR'):'—';
            return `<tr>
              <td><strong>${cc.cliente_nombre}</strong>${cc.cliente_telefono?`<br/><span class="mono muted" style="font-size:10px">${cc.cliente_telefono}</span>`:''}</td>
              <td class="muted">${cc.cliente_localidad||'—'}</td>
              <td class="mono" style="color:${color};font-weight:600">$${saldo.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
              <td class="mono muted">${parseFloat(cc.limite_credito)>0?'$'+parseFloat(cc.limite_credito).toLocaleString('es-AR'):'Sin límite'}</td>
              <td class="muted" style="font-size:12px">${ult}</td>
              <td>${badge(cc.estado)}</td>
              <td style="display:flex;gap:4px">
                <button class="btn btn-ghost btn-sm" onclick="verCuenta('${cc.id}','${cc.cliente_nombre}','${cc.cliente_telefono||''}')">Ver</button>
                ${saldo>0?`<button class="btn btn-success btn-sm" onclick="modalCobrar('${cc.id}','${cc.cliente_nombre}')">Cobrar</button>`:''}
              </td>
            </tr>`;
          }).join('')||'<tr><td colspan="7" class="empty">Sin cuentas</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

async function verCuenta(id, nombre, telefono){
  try{
    const [cc, movs] = await Promise.all([
      api(`/api/v1/cuentas-corrientes/${id}`),
      api(`/api/v1/cuentas-corrientes/${id}/movimientos?limit=30`)
    ]);
    const saldo=parseFloat(cc.saldo_actual);
    const color=saldo>0?'var(--warn)':saldo<0?'var(--accent2)':'var(--accent2)';

    openModal(`
      <h3>Cuenta corriente — ${nombre}</h3>
      <div class="detail-grid" style="margin-bottom:14px">
        <div class="detail-item"><span>Saldo actual</span>
          <strong style="font-size:18px;font-family:var(--mono);color:${color}">
            $${saldo.toLocaleString('es-AR',{minimumFractionDigits:2})}
          </strong>
        </div>
        <div class="detail-item"><span>Estado</span>${badge(cc.estado)}</div>
        <div class="detail-item"><span>Límite de crédito</span>${parseFloat(cc.limite_credito)>0?'$'+parseFloat(cc.limite_credito).toLocaleString('es-AR'):'Sin límite'}</div>
        <div class="detail-item"><span>Último movimiento</span>${cc.updated_at?new Date(cc.updated_at).toLocaleDateString('es-AR'):'—'}</div>
      </div>
      <div class="divider"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">Últimos movimientos</div>
      <div class="table-wrap" style="max-height:280px;overflow-y:auto"><table>
        <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Monto</th></tr></thead>
        <tbody>
          ${movs.length?movs.map(m=>{
            const esDebito=m.tipo==='debito';
            return `<tr>
              <td style="font-size:11px">${new Date(m.fecha).toLocaleDateString('es-AR')}</td>
              <td>${esDebito?'<span style="color:var(--warn)">▲ Débito</span>':'<span style="color:var(--accent2)">▼ Crédito</span>'}</td>
              <td class="muted" style="font-size:12px">${m.descripcion||'—'}</td>
              <td class="mono" style="color:${esDebito?'var(--warn)':'var(--accent2)'};font-weight:600">
                ${esDebito?'+':'-'}$${parseFloat(m.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}
              </td>
            </tr>`;
          }).join(''):'<tr><td colspan="4" class="empty" style="padding:20px">Sin movimientos</td></tr>'}
        </tbody>
      </table></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        <button class="btn btn-ghost btn-sm" onclick="modalAjuste('${id}')">Ajuste manual</button>
        ${telefono?`<button class="btn btn-success btn-sm" onclick="abrirWhatsApp('${telefono}','estado de cuenta')">WhatsApp</button>`:''}
        ${saldo>0?`<button class="btn btn-primary btn-sm" onclick="modalCobrar('${id}','${nombre}')">Registrar cobro</button>`:''}
      </div>`);
  }catch(e){toast(e.message,'err');}
}

async function modalCobrar(id, nombre){
  openModal(`
    <h3>Registrar cobro — ${nombre}</h3>
    <div class="field"><label>Monto *</label><input id="cob-monto" type="number" step="0.01" min="0.01" placeholder="0.00"/></div>
    <div class="field"><label>Descripción</label><input id="cob-desc" placeholder="Ej: Pago transferencia 22/05"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="registrarCobro('${id}')">Confirmar cobro</button>
    </div>`);
}

async function registrarCobro(id){
  const monto=parseFloat(document.getElementById('cob-monto').value);
  const desc=document.getElementById('cob-desc').value||null;
  if(!monto||monto<=0){toast('Ingresá un monto válido','err');return;}
  try{
    await api(`/api/v1/cuentas-corrientes/${id}/cobrar`,{method:'POST',body:JSON.stringify({monto,descripcion:desc})});
    toast('Cobro registrado');closeModal();pgCuentas();
  }catch(e){toast(e.message,'err');}
}

async function modalAjuste(id){
  openModal(`
    <h3>Ajuste manual</h3>
    <div class="field"><label>Tipo</label>
      <select id="aj-tipo">
        <option value="debito">Débito (agrega deuda)</option>
        <option value="credito">Crédito (reduce deuda)</option>
      </select>
    </div>
    <div class="field"><label>Monto *</label><input id="aj-monto" type="number" step="0.01" min="0.01" placeholder="0.00"/></div>
    <div class="field"><label>Descripción *</label><input id="aj-desc" placeholder="Motivo del ajuste"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarAjuste('${id}')">Confirmar ajuste</button>
    </div>`);
}

async function confirmarAjuste(id){
  const tipo=document.getElementById('aj-tipo').value;
  const monto=parseFloat(document.getElementById('aj-monto').value);
  const desc=document.getElementById('aj-desc').value;
  if(!monto||monto<=0){toast('Ingresá un monto válido','err');return;}
  if(!desc){toast('La descripción es obligatoria','err');return;}
  try{
    await api(`/api/v1/cuentas-corrientes/${id}/ajuste`,{method:'POST',body:JSON.stringify({tipo,monto,descripcion:desc})});
    toast('Ajuste registrado');closeModal();pgCuentas();
  }catch(e){toast(e.message,'err');}
}

async function aplicarFiltro(){
  const estado=document.getElementById('fil-estado').value;
  const conSaldo=document.getElementById('fil-deuda').checked;
  let url='/api/v1/cuentas-corrientes/?';
  if(estado) url+=`estado=${estado}&`;
  if(conSaldo) url+=`con_saldo=true`;
  closeModal();
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-ghost" onclick="pgCuentas()">↻ Actualizar</button>`;
  try{
    await api(url);
    pgCuentas();
  }catch(e){toast(e.message,'err');}
}

// ── ABM helpers ───────────────────────────────────────────────
function renderTablaCheques(cheques){
  if(!cheques.length) return '<div class="empty">Sin cheques registrados</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>N° Cheque</th><th>Banco</th><th>Beneficiario</th><th>Monto</th><th>Emisión</th><th>Vencimiento</th><th>Días</th><th>Estado</th><th></th></tr></thead>
    <tbody id="tb-cheques">
      ${cheques.map(c=>{
        const est = CH_ESTADOS[c.estado]||{label:c.estado,color:'var(--muted)'};
        const diasEl = c.dias_para_vencer !== null && c.dias_para_vencer !== undefined
          ? `<span style="font-family:var(--mono);font-weight:600;color:${c.dias_para_vencer<=3?'var(--warn)':c.dias_para_vencer<=7?'var(--orange)':'var(--text)'}">${c.dias_para_vencer}d</span>`
          : '—';
        return `<tr>
          <td><strong class="mono">${c.numero}</strong></td>
          <td>${c.banco}${c.sucursal?` <span class="muted">(${c.sucursal})</span>`:''}</td>
          <td>${c.beneficiario}</td>
          <td class="mono">$${parseFloat(c.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
          <td class="muted" style="font-size:12px">${c.fecha_emision}</td>
          <td class="muted" style="font-size:12px">${c.fecha_vencimiento}</td>
          <td>${diasEl}</td>
          <td><span class="badge b-${c.estado}">${est.label}</span></td>
          <td style="display:flex;gap:4px">
            <button class="btn btn-ghost btn-sm" onclick="verCheque('${c.id}')">Ver</button>
            <button class="btn btn-ghost btn-sm" onclick="modalEditarCheque('${c.id}')">✏️</button>
            ${CH_TRANSICIONES[c.estado]?.length?`<button class="btn btn-success btn-sm" onclick="modalCambioEstadoCheque('${c.id}','${c.estado}')">→</button>`:''}
            ${['emitido'].includes(c.estado)?`<button class="btn btn-danger btn-sm" onclick="eliminarCheque('${c.id}','${c.numero}')">🗑️</button>`:''}
          </td>

  </table></div>`;
}

async function recargarCheques(){
  const estado = document.getElementById('ch-filtro-estado')?.value||'';
  const benef  = document.getElementById('ch-filtro-benef')?.value||'';
  let url = '/api/v1/cheques-emitidos/?';
  if(estado) url+=`estado=${estado}&`;
  if(benef)  url+=`beneficiario=${encodeURIComponent(benef)}&`;
  try{
    const cheques = await api(url);
    window._chTodos = cheques;
    const wrap = document.getElementById('ch-tabla-wrap');
    if(wrap) wrap.innerHTML = renderTablaCheques(cheques);
  }catch(e){toast(e.message,'err');}
}

function _payloadCheque(){
  return {
    numero:            document.getElementById('ch-numero').value.trim(),
    banco:             document.getElementById('ch-banco').value.trim(),
    sucursal:          document.getElementById('ch-sucursal').value.trim()||null,
    beneficiario:      document.getElementById('ch-beneficiario').value.trim(),
    monto:             parseFloat(document.getElementById('ch-monto').value),
    fecha_emision:     document.getElementById('ch-femision').value,
    fecha_vencimiento: document.getElementById('ch-fvencimiento').value,
    concepto:          document.getElementById('ch-concepto').value.trim()||null,
    observaciones:     document.getElementById('ch-observaciones').value.trim()||null,
  };
}

function _validarCheque(p){
  if(!p.numero||!p.banco||!p.beneficiario||!p.monto||!p.fecha_emision||!p.fecha_vencimiento){
    toast('Completa los campos obligatorios (*)','err'); return false;
  }
  if(p.fecha_vencimiento < p.fecha_emision){
    toast('La fecha de vencimiento no puede ser anterior a la de emision','err'); return false;
  }
  return true;
}

function modalNuevoCheque(){
  openModal(`
    <h3>Nuevo cheque emitido</h3>
    ${_formCheque()}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearCheque()">Guardar</button>
    </div>`);
}

async function crearCheque(){
  const p = _payloadCheque();
  if(!_validarCheque(p)) return;
  try{
    await api('/api/v1/cheques-emitidos/',{method:'POST',body:JSON.stringify(p)});
    toast('Cheque registrado');closeModal();pgCheques();
  }catch(e){toast(e.message,'err');}
}

async function modalEditarCheque(id){
  try{

async function guardarCheque(id){

}

    <div class="stat-card" style="margin-bottom:16px">

        <div style="font-size:13px;font-weight:600;color:var(--text)">📅 Período a analizar</div>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:12px;color:var(--muted)">Desde</label>
          <input type="date" id="car-desde" value="${def_desde}" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none" onchange="actualizarCartera()"/>
        </div>

          <label style="font-size:12px;color:var(--muted)">Hasta</label>
          <input type="date" id="car-hasta" value="${def_hasta}" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none" onchange="actualizarCartera()"/>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="setRangoCartera(7)">7d</button>
          <button class="btn btn-ghost btn-sm" onclick="setRangoCartera(15)">15d</button>
          <button class="btn btn-ghost btn-sm" onclick="setRangoCartera(30)">30d</button>
          <button class="btn btn-ghost btn-sm" onclick="setRangoCartera(60)">60d</button>
          <button class="btn btn-ghost btn-sm" onclick="setRangoCartera(90)">90d</button>
        </div>
      </div>
    </div>
    <div id="cartera-body"></div>`;

function setRangoCartera(dias){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  document.getElementById('car-desde').value = hoy.toISOString().split('T')[0];
  document.getElementById('car-hasta').value = new Date(hoy.getTime()+dias*86400000).toISOString().split('T')[0];
  actualizarCartera();
}

function actualizarCartera(){
  const desde_str = document.getElementById('car-desde')?.value;
  const hasta_str = document.getElementById('car-hasta')?.value;
  if(!desde_str||!hasta_str) return;

  const desde = new Date(desde_str+'T00:00:00');
  const hasta  = new Date(hasta_str+'T00:00:00');
  if(hasta < desde){ toast('La fecha hasta debe ser mayor a la fecha desde','err'); return; }

  const todos   = window._chTodos || [];
  const activos = todos.filter(c=>['emitido','en_transito','en_ventana'].includes(c.estado));
  const enRango = activos.filter(c=>{
    const d = new Date(c.fecha_vencimiento+'T00:00:00');
    return d >= desde && d <= hasta;
  }).sort((a,b)=>a.fecha_vencimiento.localeCompare(b.fecha_vencimiento));

  const totalRango   = enRango.reduce((s,c)=>s+parseFloat(c.monto||0),0);
  const promedioRango = enRango.length ? totalRango/enRango.length : 0;
  const diasRango    = Math.round((hasta-desde)/86400000)+1;

  // ── Cards resumen ──
  const cardsHtml = `
    <div class="stats-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
      <div class="stat-card"><div class="stat-label">Cheques en período</div><div class="stat-value" style="font-size:22px">${enRango.length}</div><div class="stat-sub">de ${activos.length} activos</div></div>
      <div class="stat-card"><div class="stat-label">Total comprometido</div><div class="stat-value" style="color:var(--orange);font-size:20px">$${totalRango.toLocaleString('es-AR',{minimumFractionDigits:0})}</div><div class="stat-sub">en ${diasRango} días</div></div>
      <div class="stat-card"><div class="stat-label">Promedio por cheque</div><div class="stat-value" style="font-size:20px">$${promedioRango.toLocaleString('es-AR',{minimumFractionDigits:0})}</div><div class="stat-sub">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Egreso diario prom.</div><div class="stat-value" style="color:var(--warn);font-size:20px">$${diasRango>0?(totalRango/diasRango).toLocaleString('es-AR',{minimumFractionDigits:0}):'0'}</div><div class="stat-sub">por día hábil estimado</div></div>
    </div>`;

  // ── Timeline ──
  const timelineHtml = enRango.length ? buildTimeline(enRango, desde, hasta) : '';

  // ── Calendario ──
  const calHtml = buildCalendario(enRango, desde, hasta);

  // ── Tabla con acumulado ──
  const tablaHtml = buildTablaAcumulado(enRango);

  document.getElementById('cartera-body').innerHTML = cardsHtml + timelineHtml + calHtml + tablaHtml;
}

function buildTimeline(cheques, desde, hasta){
  const totalMs = hasta - desde || 1;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const colores = ['#4f7cff','#00d4aa','#f59e0b','#ff6b6b','#a78bfa','#34d399','#fb923c'];

  const dots = cheques.map((c,i)=>{
    const d = new Date(c.fecha_vencimiento+'T00:00:00');
    const pct = Math.max(0,Math.min(100, (d-desde)/totalMs*100));
    const dias = Math.round((d-hoy)/86400000);
    const color = dias<=0?'#ff6b6b':dias<=3?'#ff6b6b':dias<=7?'#f59e0b':'#4f7cff';
    const monto = '$'+parseFloat(c.monto).toLocaleString('es-AR',{minimumFractionDigits:0});
    return `<div class="timeline-dot" style="left:${pct}%;background:${color}" title="N°${c.numero} · ${c.beneficiario} · ${monto} · vence ${c.fecha_vencimiento}">
      <div class="timeline-dot-label" style="color:${color}">${monto}</div>
    </div>`;
  }).join('');

  // Ticks cada N días
  const numTicks = Math.min(8, Math.round(totalMs/86400000)+1);
  const stepMs = totalMs / (numTicks-1 || 1);
  const ticks = Array.from({length:numTicks},(_,i)=>{
    const d = new Date(desde.getTime()+i*stepMs);
    const pct = i/(numTicks-1 || 1)*100;
    const label = d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
    return `<div class="timeline-tick" style="left:${pct}%"><div class="timeline-tick-label">${label}</div></div>`;
  }).join('');

  // Marcador hoy
  const hoyPct = Math.max(0,Math.min(100,(hoy-desde)/totalMs*100));
  const hoyMark = hoy>=desde&&hoy<=hasta
    ? `<div style="position:absolute;left:${hoyPct}%;top:0;bottom:0;width:2px;background:var(--accent2);opacity:.7"><div style="position:absolute;top:-16px;left:4px;font-size:10px;color:var(--accent2);white-space:nowrap;font-family:var(--mono)">Hoy</div></div>`
    : '';

  return `
    <div class="timeline-wrap" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">📍 Timeline de vencimientos</div>
      <div class="timeline-track">
        ${hoyMark}
        ${dots}
        <div class="timeline-axis">${ticks}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:20px">Pasá el cursor sobre cada punto para ver el detalle del cheque</div>
    </div>`;
}

function buildCalendario(cheques, desde, hasta){
  // Agrupar cheques por fecha
  const porFecha = {};
  cheques.forEach(c=>{
    if(!porFecha[c.fecha_vencimiento]) porFecha[c.fecha_vencimiento]={count:0,monto:0,items:[]};
    porFecha[c.fecha_vencimiento].count++;
    porFecha[c.fecha_vencimiento].monto += parseFloat(c.monto||0);
    porFecha[c.fecha_vencimiento].items.push(c);
  });

  // Determinar meses a mostrar
  const meses = [];
  let cur = new Date(desde.getFullYear(), desde.getMonth(), 1);
  const finMeses = new Date(hasta.getFullYear(), hasta.getMonth()+1, 1);
  while(cur < finMeses){
    meses.push(new Date(cur));
    cur.setMonth(cur.getMonth()+1);
  }

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const diasSem = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  const mesesHtml = meses.map(mesDate=>{
    const año = mesDate.getFullYear();
    const mes  = mesDate.getMonth();
    const nombreMes = mesDate.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
    const primerDia = new Date(año,mes,1).getDay(); // 0=Dom
    const diasEnMes = new Date(año,mes+1,0).getDate();

    const headerDias = diasSem.map(d=>`<div class="cal-header">${d}</div>`).join('');
    let cells = Array(primerDia).fill(`<div class="cal-cell out-month"></div>`).join('');

    for(let d=1; d<=diasEnMes; d++){
      const dateStr = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate = new Date(año,mes,d);
      const isToday  = cellDate.getTime()===hoy.getTime();
      const data     = porFecha[dateStr];
      const enRangoCell = cellDate>=desde && cellDate<=hasta;
      let cls = 'cal-cell';
      if(data && enRangoCell) cls += ' has-cheque';
      if(isToday) cls += ' today';
      if(!enRangoCell && !isToday) cls += ' out-month';
      const montoStr = data&&enRangoCell ? `<div class="cal-monto">$${data.monto.toLocaleString('es-AR',{maximumFractionDigits:0})}</div><div class="cal-count">${data.count} cheque${data.count>1?'s':''}</div>` : '';
      const onclick = data&&enRangoCell ? `onclick="verChequesDelDia('${dateStr}')"` : '';
      cells += `<div class="${cls}" ${onclick}><div class="cal-day">${d}</div>${montoStr}</div>`;
    }

    return `
      <div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:600;text-transform:capitalize;margin-bottom:8px;color:var(--text)">${nombreMes}</div>
        <div class="cal-grid">${headerDias}${cells}</div>
      </div>`;
  }).join('');

  return `
    <div class="stat-card" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:14px">📆 Calendario de vencimientos <span style="font-size:11px;color:var(--muted);font-weight:400">(celdas naranjas = hay cheques · clic para ver detalle)</span></div>
      ${mesesHtml}
    </div>`;
}

function buildTablaAcumulado(cheques){
  if(!cheques.length) return `<div class="empty">Sin cheques en el período seleccionado</div>`;

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  let acum = 0;
  const totalGlobal = cheques.reduce((s,c)=>s+parseFloat(c.monto||0),0);

  const filas = cheques.map(c=>{
    const dias = Math.round((new Date(c.fecha_vencimiento+'T00:00:00')-hoy)/86400000);
    const monto = parseFloat(c.monto||0);
    acum += monto;
    const pctAcum = totalGlobal>0 ? (acum/totalGlobal*100).toFixed(1) : 0;
    const colorDias = dias<0?'var(--muted)':dias===0?'var(--warn)':dias<=3?'var(--warn)':dias<=7?'var(--orange)':'var(--text)';
    const diasStr = dias<0?'Vencido':dias===0?'HOY':dias+'d';
    const est = CH_ESTADOS[c.estado]||{label:c.estado};
    return `<tr>
      <td class="muted" style="font-size:11px">${c.fecha_vencimiento}</td>
      <td><strong class="mono">${c.numero}</strong></td>
      <td>${c.banco}${c.sucursal?' ('+c.sucursal+')':''}</td>
      <td>${c.beneficiario}</td>
      <td class="mono">$${monto.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
      <td><span style="font-family:var(--mono);font-weight:700;color:${colorDias}">${diasStr}</span></td>
      <td><span class="badge b-${c.estado}">${est.label}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="acum-bar" style="width:${Math.max(4,parseFloat(pctAcum)*.8)}px;min-width:4px"></div>
          <span class="mono" style="font-size:11px;color:var(--muted)">$${acum.toLocaleString('es-AR',{minimumFractionDigits:0})} <span style="color:var(--muted)">(${pctAcum}%)</span></span>
        </div>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="stat-card">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px">📋 Detalle ordenado por vencimiento con acumulado</div>
      <div class="table-wrap" style="overflow-x:auto"><table>
        <thead><tr><th>Vencimiento</th><th>N° Cheque</th><th>Banco</th><th>Beneficiario</th><th>Monto</th><th>Días</th><th>Estado</th><th>Acumulado</th></tr></thead>
        <tbody>${filas}</tbody>
      </table></div>
      <div style="text-align:right;margin-top:12px;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--orange)">
        TOTAL: $${totalGlobal.toLocaleString('es-AR',{minimumFractionDigits:2})}
      </div>
    </div>`;
}

function verChequesDelDia(fechaStr){
  const todos = window._chTodos || [];
  const del_dia = todos.filter(c=>c.fecha_vencimiento===fechaStr && ['emitido','en_transito'].includes(c.estado));
  if(!del_dia.length) return;
  const total = del_dia.reduce((s,c)=>s+parseFloat(c.monto||0),0);
  const filas = del_dia.map(c=>`<tr>
    <td class="mono"><strong>${c.numero}</strong></td>
    <td>${c.banco}</td>
    <td>${c.beneficiario}</td>
    <td class="mono">$${parseFloat(c.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
    <td><span class="badge b-${c.estado}">${CH_ESTADOS[c.estado]?.label||c.estado}</span></td>
  </tr>`).join('');
  openModal(`
    <h3>Cheques que vencen el ${fechaStr}</h3>
    <div class="table-wrap"><table>
      <thead><tr><th>N° Cheque</th><th>Banco</th><th>Beneficiario</th><th>Monto</th><th>Estado</th></tr></thead>
      <tbody>${filas}</tbody>
    </table></div>
    <div style="text-align:right;margin-top:12px;font-family:var(--mono);font-weight:700;color:var(--orange)">Total del día: $${total.toLocaleString('es-AR',{minimumFractionDigits:2})}</div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
}

      <div class="field"><label>Nombre *</label><input id="pv-nombre" value="${d?.nombre||''}"/></div>

    </div>

    </div>
    <div class="form-row">
      <div class="field"><label>CBU</label><input id="pv-cbu" value="${d?.cbu||''}" placeholder="22 dígitos"/></div>

function _payloadProveedor(){
  return {
    nombre:        document.getElementById('pv-nombre').value.trim(),
    cuit:          document.getElementById('pv-cuit').value.trim()||null,
    telefono:      document.getElementById('pv-tel').value.trim()||null,
    email:         document.getElementById('pv-email').value.trim()||null,
    direccion:     document.getElementById('pv-dir').value.trim()||null,
    localidad:     document.getElementById('pv-loc').value.trim()||null,
    condicion_iva: document.getElementById('pv-iva').value,
    rubro:         document.getElementById('pv-rubro').value.trim()||null,
    cbu:           document.getElementById('pv-cbu').value.trim()||null,
    alias:         document.getElementById('pv-alias').value.trim()||null,
    banco:         document.getElementById('pv-banco').value.trim()||null,
    contacto:      document.getElementById('pv-contacto').value.trim()||null,
    observaciones: document.getElementById('pv-obs').value.trim()||null,

function modalNuevoProveedor(){
  openModal(`<h3>Nuevo proveedor</h3>${_formProveedor()}<div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="crearProveedor()">Guardar</button>
  </div>`);
}

async function crearProveedor(){
  const p = _payloadProveedor();
  if(!p.nombre){toast('El nombre es obligatorio','err');return;}
  try{
    await api('/api/v1/proveedores/',{method:'POST',body:JSON.stringify(p)});
    toast('Proveedor creado');closeModal();pgProveedores();
  }catch(e){toast(e.message,'err');}
}

async function modalEditarProveedor(id){
  try{
    const p = await api(`/api/v1/proveedores/${id}`);
    openModal(`<h3>Editar proveedor</h3>${_formProveedor(p)}
      <div class="field"><label>Estado</label><select id="pv-estado">
        <option value="activo" ${p.estado==='activo'?'selected':''}>Activo</option>
        <option value="inactivo" ${p.estado==='inactivo'?'selected':''}>Inactivo</option>
      </select></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarProveedor('${id}')">Guardar cambios</button>
      </div>`);
  }catch(e){toast(e.message,'err');}
}

async function guardarProveedor(id){
  const p = _payloadProveedor();
  const estadoEl = document.getElementById('pv-estado');
  if(estadoEl) p.estado = estadoEl.value;
  try{
    await api(`/api/v1/proveedores/${id}`,{method:'PATCH',body:JSON.stringify(p)});
    toast('Proveedor actualizado');closeModal();pgProveedores();
  }catch(e){toast(e.message,'err');}
}

      <div class="detail-grid" style="margin-bottom:14px">
        <div class="detail-item"><span>CUIT</span>${p.cuit||'—'}</div>
        <div class="detail-item"><span>Condición IVA</span>${COND_IVA_PROV[p.condicion_iva]||p.condicion_iva}</div>
        <div class="detail-item"><span>Teléfono</span>${p.telefono||'—'}</div>
        <div class="detail-item"><span>Email</span>${p.email||'—'}</div>
        <div class="detail-item"><span>Rubro</span>${p.rubro||'—'}</div>
        <div class="detail-item"><span>Contacto</span>${p.contacto||'—'}</div>
        <div class="detail-item"><span>CBU</span><span class="mono" style="font-size:11px">${p.cbu||'—'}</span></div>
        <div class="detail-item"><span>Alias</span>${p.alias||'—'}</div>
        <div class="detail-item" style="grid-column:1/-1">
          <span>Saldo cuenta corriente (DGC debe)</span>
          <strong style="font-size:18px;font-family:var(--mono);color:${saldoColor}">$${saldo.toLocaleString('es-AR',{minimumFractionDigits:2})}</strong>
        </div>
      </div>
      <div class="divider"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.7px">Últimos movimientos</div>
      <div class="table-wrap" style="max-height:240px;overflow-y:auto"><table>
        <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Monto</th></tr></thead>
        <tbody>${filasMov||'<tr><td colspan="4" class="empty" style="padding:16px">Sin movimientos</td></tr>'}</tbody>
      </table></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
        <button class="btn btn-ghost btn-sm" onclick="modalEditarProveedor('${p.id}')">Editar</button>
        ${saldo>0?`<button class="btn btn-primary btn-sm" onclick="modalPagarProveedor('${p.id}','${p.nombre}')">Registrar pago</button>`:''}
      </div>`);
  }catch(e){toast(e.message,'err');}
}

function modalPagarProveedor(id, nombre){
  openModal(`
    <h3>Registrar pago — ${nombre}</h3>
    <div class="field"><label>Monto *</label><input id="pv-pago-monto" type="number" step="0.01" min="0.01" placeholder="0.00"/></div>
    <div class="field"><label>Descripción</label><input id="pv-pago-desc" placeholder="Ej: Transferencia 15/06"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarPagoProveedor('${id}')">Confirmar pago</button>
    </div>`);
}

async function confirmarPagoProveedor(id){
  const monto = parseFloat(document.getElementById('pv-pago-monto').value);
  const desc  = document.getElementById('pv-pago-desc').value.trim()||null;
  if(!monto||monto<=0){toast('Ingresa un monto valido','err');return;}
  try{
    await api(`/api/v1/proveedores/${id}/cuenta/pagar`,{method:'POST',body:JSON.stringify({monto,descripcion:desc})});
    toast('Pago registrado');closeModal();pgProveedores();
  }catch(e){toast(e.message,'err');}
}

// ══════════════════════════════════════════════════════════════
//  GASTOS
// ══════════════════════════════════════════════════════════════
const CAT_LABELS = {
  materias_primas:'Materias Primas', servicios:'Servicios',
  fletes:'Fletes', impuestos:'Impuestos',
  mantenimiento:'Mantenimiento', otros:'Otros'
};
const COMP_LABELS = {
  factura_a:'Factura A', factura_b:'Factura B', factura_c:'Factura C',
  ticket:'Ticket', remito:'Remito', otro:'Otro'
};
const FPAGO_LABELS = {
  efectivo:'Efectivo', transferencia:'Transferencia',
  cheque:'Cheque', cuenta_corriente_proveedor:'Cuenta Cte. Prov.'
};

async function pgGastos(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="modalNuevoGasto()">+ Nuevo gasto</button>`;
  try{
    const [gastos, resumen] = await Promise.all([
      api('/api/v1/gastos/'),
      api('/api/v1/gastos/resumen')
    ]);

    const catColors = {materias_primas:'#a855f7',servicios:'var(--accent)',fletes:'var(--orange)',impuestos:'var(--warn)',mantenimiento:'#34d399',otros:'var(--muted)'};
    const catBars = Object.entries(resumen.por_categoria).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span>${CAT_LABELS[k]||k}</span>
          <span class="mono" style="color:${catColors[k]||'var(--muted)'}">$${v.toLocaleString('es-AR',{minimumFractionDigits:0})}</span>
        </div>
        <div style="height:5px;background:var(--border);border-radius:3px">
          <div style="height:100%;border-radius:3px;background:${catColors[k]||'var(--muted)'};width:${resumen.total_año>0?Math.round(v/resumen.total_año*100):0}%"></div>
        </div>
      </div>`).join('');

    setContent(`
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Total mes actual</div><div class="stat-value" style="color:var(--warn);font-size:20px">$${resumen.total_mes.toLocaleString('es-AR',{minimumFractionDigits:0})}</div></div>
        <div class="stat-card"><div class="stat-label">Total año</div><div class="stat-value" style="font-size:20px">$${resumen.total_año.toLocaleString('es-AR',{minimumFractionDigits:0})}</div></div>
        <div class="stat-card"><div class="stat-label">Gastos pendientes</div><div class="stat-value" style="color:var(--orange)">${resumen.cantidad_pendientes}</div><div class="stat-sub">$${resumen.monto_pendientes.toLocaleString('es-AR',{minimumFractionDigits:0})}</div></div>
        <div class="stat-card"><div class="stat-label">Por categoría (año)</div>${catBars||'<div class="muted" style="font-size:12px">Sin datos</div>'}</div>
      </div>
      <div class="section-header">
        <h3>${gastos.length} gastos</h3>
        <input class="search-input" placeholder="Buscar…" oninput="filtrar(this.value,'tb-gastos')"/>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Fecha</th><th>Proveedor</th><th>Comprobante</th><th>Concepto</th><th>Categoría</th><th>Monto</th><th>Forma pago</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tb-gastos">
          ${gastos.map(g=>{
            const estadoBadge = g.estado==='pagado'?'<span class="badge b-pagado">Pagado</span>':g.estado==='pendiente'?'<span class="badge b-pendiente">Pendiente</span>':'<span class="badge b-anulado">Anulado</span>';
            return `<tr>
              <td class="muted" style="font-size:12px">${g.fecha}</td>
              <td>${g.proveedor_nombre||'<span class="muted">—</span>'}</td>
              <td class="mono" style="font-size:11px">${COMP_LABELS[g.tipo_comprobante]||g.tipo_comprobante}${g.numero_comprobante?' N°'+g.numero_comprobante:''}</td>
              <td>${g.concepto}</td>
              <td><span class="badge b-${g.categoria}">${CAT_LABELS[g.categoria]||g.categoria}</span></td>
              <td class="mono" style="font-weight:600">$${parseFloat(g.monto).toLocaleString('es-AR',{minimumFractionDigits:2})}</td>
              <td class="muted" style="font-size:12px">${FPAGO_LABELS[g.forma_pago]||g.forma_pago}${g.cheque_numero?' (N°'+g.cheque_numero+')':''}</td>
              <td>${estadoBadge}</td>
              <td style="display:flex;gap:4px">
                ${g.estado==='pendiente'?`<button class="btn btn-success btn-sm" onclick="pagarGasto('${g.id}')">✓ Pagar</button>`:''}
                ${g.estado!=='anulado'?`<button class="btn btn-danger btn-sm" onclick="anularGasto('${g.id}')">Anular</button>`:''}
              </td>
            </tr>`;
          }).join('')||'<tr><td colspan="9" class="empty">Sin gastos registrados</td></tr>'}
        </tbody>
      </table></div>`);
  }catch(e){setContent(`<div class="empty">⚠️ ${e.message}</div>`);}
}

async function modalNuevoGasto(){
  let proveedores=[], cheques=[];
  try{
    [proveedores, cheques] = await Promise.all([
      api('/api/v1/proveedores/?estado=activo'),
      api('/api/v1/cheques-emitidos/?estado=en_transito')
    ]);
  }catch(e){}
  const hoy = new Date().toISOString().split('T')[0];
  openModal(`
    <h3>Nuevo gasto</h3>
    <div class="form-row">
      <div class="field"><label>Fecha *</label><input id="gs-fecha" type="date" value="${hoy}"/></div>
      <div class="field"><label>Proveedor</label>
        <select id="gs-proveedor" onchange="onProveedorGastoChange()">
          <option value="">Sin proveedor / Varios</option>
          ${proveedores.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="field"><label>Tipo comprobante</label>
        <select id="gs-comprobante">
          ${Object.entries(COMP_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>N° Comprobante</label><input id="gs-nrocomp" placeholder="0001-00012345"/></div>
    </div>
    <div class="field"><label>Concepto *</label><input id="gs-concepto" placeholder="Descripcion del gasto"/></div>
    <div class="form-row">
      <div class="field"><label>Categoría</label>
        <select id="gs-categoria">
          ${Object.entries(CAT_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Monto *</label><input id="gs-monto" type="number" step="0.01" min="0" placeholder="0.00"/></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Forma de pago</label>
        <select id="gs-fpago" onchange="onFormaPagoGastoChange()">
          ${Object.entries(FPAGO_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
        </select>
      </div>
      <div class="field" id="gs-cheque-wrap" style="display:none"><label>Cheque emitido</label>
        <select id="gs-cheque">
          <option value="">Seleccionar cheque...</option>
          ${cheques.map(c=>`<option value="${c.id}">N°${c.numero} — ${c.beneficiario} — $${parseFloat(c.monto).toLocaleString('es-AR')}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field"><label>Observaciones</label><textarea id="gs-obs" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearGasto()">Registrar gasto</button>
    </div>`);
}

function onFormaPagoGastoChange(){
  const fp = document.getElementById('gs-fpago').value;
  document.getElementById('gs-cheque-wrap').style.display = fp==='cheque' ? '' : 'none';
}

function onProveedorGastoChange(){
  const fp = document.getElementById('gs-fpago');
  // Si no hay proveedor, deshabilitar CC proveedor
  const provId = document.getElementById('gs-proveedor').value;
  for(const opt of fp.options){
    if(opt.value==='cuenta_corriente_proveedor') opt.disabled = !provId;
  }
  if(!provId && fp.value==='cuenta_corriente_proveedor') fp.value='transferencia';
}

async function crearGasto(){
  const concepto = document.getElementById('gs-concepto').value.trim();
  const monto    = parseFloat(document.getElementById('gs-monto').value);
  const fpago    = document.getElementById('gs-fpago').value;
  const chequeId = document.getElementById('gs-cheque')?.value||null;
  if(!concepto){toast('El concepto es obligatorio','err');return;}
  if(!monto||monto<=0){toast('Ingresa un monto valido','err');return;}
  if(fpago==='cheque'&&!chequeId){toast('Selecciona un cheque','err');return;}
  const payload = {
    fecha:              document.getElementById('gs-fecha').value,
    proveedor_id:       document.getElementById('gs-proveedor').value||null,
    tipo_comprobante:   document.getElementById('gs-comprobante').value,
    numero_comprobante: document.getElementById('gs-nrocomp').value.trim()||null,
    concepto,
    categoria:          document.getElementById('gs-categoria').value,
    monto,
    forma_pago:         fpago,
    cheque_id:          chequeId,
    observaciones:      document.getElementById('gs-obs').value.trim()||null,
  };
  try{
    await api('/api/v1/gastos/',{method:'POST',body:JSON.stringify(payload)});
    toast('Gasto registrado');closeModal();pgGastos();
  }catch(e){toast(e.message,'err');}
}

async function pagarGasto(id){
  try{
    await api(`/api/v1/gastos/${id}/pagar`,{method:'PATCH'});
    toast('Gasto marcado como pagado');pgGastos();
  }catch(e){toast(e.message,'err');}
}

async function anularGasto(id){
  if(!confirm('Anular este gasto?')) return;
  try{
    await api(`/api/v1/gastos/${id}/anular`,{method:'PATCH'});
    toast('Gasto anulado');pgGastos();
  }catch(e){toast(e.message,'err');}
}

</script>
